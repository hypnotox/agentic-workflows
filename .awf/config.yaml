agents:
  - adr-reviewer
  - code-reviewer
  - plan-reviewer
audit:
  allowedScopes:
    - name: adr
      meaning: ADR markdown documents
    - name: adr-system
      meaning: the ADR machinery code (ACTIVE.md generation, lifecycle)
    - name: awf
      meaning: genuinely cross-cutting / repo-meta work, the umbrella of last resort
    - name: config
      meaning: the .awf config tree, schema, migrations
    - name: invariants
      meaning: invariant backing and checks
    - name: plans
      meaning: plan markdown documents
    - name: rendering
      meaning: the render engine and templates
    - name: tooling
      meaning: CLI, audit/gate, coverage, CI, ./x, changelog, evals
docs:
  - architecture
  - development
  - glossary
  - pitfalls
  - releasing
  - roadmap
  - testing
domains:
  - adr-system
  - config
  - invariants
  - rendering
  - tooling
invariants:
  disabled: false
  sources:
    - globs:
        - '**/*.go'
      marker: //
    - globs:
        - '.awf/**/parts/**/*.md'
        - 'templates/**'
      marker: '<!-- awf:comment'
      close: '-->'
  testGlobs:
    - '**/*_test.go'
prefix: awf
skills:
  - adr-lifecycle
  - brainstorming
  - bugfix
  - debugging
  - executing-plans
  - proposing-adr
  - refactor-coupling-audit
  - retrospective
  - reviewing-adr
  - reviewing-impl
  - reviewing-plan
  - reviewing-plan-resync
  - subagent-driven-development
  - tdd
  - writing-plans
