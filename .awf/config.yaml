contextIgnore:
  - .awf/**
  - docs/**
  - examples/**
  - .github/**
  - .githooks/**
  - changelog/**
  - internal/testsupport/**
  - LICENSE
  - go.mod
  - go.sum
  - README.md
  - codecov.yml
  - .gitignore
  - .golangci.yml
  - .goreleaser.yaml
  - .gremlins.yaml
targets:
  - claude
  - pi
vars:
  activeMdRegenCmd: ./x sync
  checkCmd: ./x check
  commitGateCmd: ./x commit-gate
  gateCmd: ./x gate
  gateCmdFull: ./x gate full
  invariantTestPath: ./internal/...
  proseGateCmd: ./x prose-gate
  testCmd: go test ./...
bootstrap:
  enabled: false
hooks:
  enabled: true
proseGate:
  enabled: true
  exemptions:
    - path: docs/decisions/0113-em-dash-free-shipped-templates.md
      codepoint: U+2014
      count: 7
    - path: docs/plans/2026-07-13-invariant-backing-migration-to-enforced-test-scoped-backing.md
      codepoint: U+2014
      count: 1
    - path: .awf/docs/pitfalls.yaml
      codepoint: U+201C
      count: 1
    - path: docs/pitfalls.md
      codepoint: U+201C
      count: 1
