agents:
  - adr-reviewer
  - code-reviewer
  - plan-reviewer
audit:
  allowedScopes:
    - name: adr
      meaning: ADR markdown documents
    - name: adr-system
      meaning: the ADR machinery code (ACTIVE.md generation, lifecycle)
    - name: awf
      meaning: genuinely cross-cutting / repo-meta work — the umbrella of last resort
    - name: config
      meaning: the .awf config tree, schema, migrations
    - name: invariants
      meaning: invariant backing and checks
    - name: plans
      meaning: plan markdown documents
    - name: rendering
      meaning: the render engine and templates
    - name: tooling
      meaning: CLI, audit/gate, coverage, CI, ./x, changelog, evals
docs:
  - architecture
  - development
  - glossary
  - pitfalls
  - testing
domains:
  - adr-system
  - config
  - invariants
  - rendering
  - tooling
invariants:
  disabled: false
  sources:
    - globs:
        - '*.go'
      marker: //
prefix: awf
skills:
  - adr-lifecycle
  - brainstorming
  - bugfix
  - debugging
  - executing-plans
  - proposing-adr
  - refactor-coupling-audit
  - retrospective
  - reviewing-adr
  - reviewing-impl
  - reviewing-plan
  - reviewing-plan-resync
  - subagent-driven-development
  - tdd
  - writing-plans
targets:
  - claude
  - cursor
vars:
  activeMdRegenCmd: ./x sync
  adrProposeCommitFmt: 'docs(adr): propose NNNN <short title>'
  checkCmd: ./x check
  commitGateCmd: ./x commit-gate
  docCurrencyTargets: AGENTS.md, docs/decisions/README.md
  gateCmd: ./x gate
  gateCmdFull: ./x gate full
  gateDuration: ~15s
  invariantTestPath: ./internal/...
  modulePrefix: github.com/hypnotox/agentic-workflows
  testCmd: go test ./...
bootstrap:
  enabled: false
hooks:
  enabled: true
