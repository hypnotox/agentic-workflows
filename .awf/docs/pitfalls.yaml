data:
  pitfalls:
    - title: "A V2 ADR's Implementing flip cannot commit alone"
      domains: [adr-system]
      tags: [adr-lifecycle, plan-taxonomy]
      body: |
        The current-state-v2 parser rejects an ADR whose Status history ends on an Implementing
        event: "implementing status event must be followed by the first Applied event". A plan that
        schedules a standalone begin-implementation commit (flip to Implementing, sync, commit) is
        therefore structurally unexecutable - every `./x sync`, `./x check`, and gate run fails to
        parse the ADR until the first Applied event exists, so the Implementing flip must travel in
        the same staged transaction as the first Applied batch and its claim mutations. The
        ADR-0147 plan scheduled exactly that standalone phase and it survived the full plan review,
        the verify pass, and the plan-ADR resync; only the parser caught it at execution time. When
        authoring or reviewing a plan for a V2 ADR with incremental batches, check that no phase
        commits an Implementing event without its paired first Applied event. The terminal edge
        mirrors this: Implemented requires zero remaining operations while Implementing requires
        both applied and remaining ones, so the Implemented status event must land in the same
        staged transaction as the final Applied batch, and it carries the frozen digest but no
        state-sequence when explicit Applied events exist. The ADR-0148 grounding check caught a
        design that would have scheduled the Implemented flip as its own commit; plans must pin
        both ends of the batch choreography, not just the first.
    - title: "A schema-generation bump needs `awf upgrade`, not `awf sync`"
      domains: [config, tooling]
      tags: [schema-migration, upgrade-flow]
      body: |
        Registering a migration raises `migrate.Current()`, which immediately puts the repo's own
        `.awf/` tree one generation behind its freshly-built binary. `awf sync` and `awf check` then
        *refuse* with "config schema is behind (generation N-1 < N); run awf upgrade" rather than
        re-rendering, so a plan step that says "run `./x sync` and stage the result" cannot work at
        that point. Run `go run ./cmd/awf upgrade`, which applies the new migration to this repo and
        re-syncs. The same applies to `examples/sundial`: it carries its own schema generation and is
        gated by `./x check` (ADR-0090), so upgrade it too, with a source-built binary from the repo
        root. Bit the ADR-0127 plan, whose Task 2.5 named the wrong command for both trees.
    - title: "`awf audit` and `extensions.worktreeConfig`"
      domains: [tooling]
      tags: [repo-open, audit-rules]
      body: |
        `git.PlainOpen` (go-git) refuses to open a repo whose `.git/config` has `extensions.worktreeConfig = true` (a flag `git worktree add` can leave behind even after the worktree is removed) regardless of `core.repositoryformatversion`. Cause: go-git's extension-support check lowercases the extension name before comparing it against its allow-list, whose key is mixed-case, so the lookup never matches. `internal/git`'s `OpenRepo` works around it by opening through a `storage.Storer` wrapper that hides the `[extensions]` config section from go-git before the check runs; awf's git-reading commands never read repo extensions, so hiding the section is safe. Any future awf code opening a repo must go through `internal/git.OpenRepo`, not `git.PlainOpen` directly (the go-git handling was extracted from `internal/audit` into the shared `internal/git` package so `awf audit` and `awf context` share one tolerant open path).
    - title: "Stdout is API in command-substitution scripts"
      domains: [rendering]
      tags: [bootstrap-porcelain]
      body: |
        `.awf/bootstrap.sh` is consumed as `"$(bash .awf/bootstrap.sh)" <args>`, so its stdout is the
        binary path and nothing else; a checksum tool's `<asset>: OK` line on stdout execs as part of
        the command and fails only on cache-miss runs, which presents as flaky CI. Every diagnostic in
        rendered shell must carry `>&2`; `TestBootstrapStdoutPathOnly` pins this (`invariant:
        bootstrap-stdout-path-only`, ADR-0049).
    - title: "Adding a catalog skill: what the guards force"
      domains: [rendering]
      tags: [kind-descriptor, render-completeness]
      body: |
        A new `SkillSpec` in `internal/catalog/standard.go` is covered automatically by the
        catalog-derived eval fixture (ADR-0053) and by ADR-0080's derived guards, which fail
        loudly and name the missing piece:

        - `TestCatalogTemplatesDegradeLeakFree` sweeps the template under empty data; an
          unconditional reference to another skill must be declared in `RequiresSkills`
          (exact both ways: undeclared references and stale declarations each fail).
        - `TestConditionalTemplatesHaveFallbackCases` requires a hand-authored
          `unsetFallbackCases` entry when the template carries conditional fallback prose;
          the degraded phrases themselves stay human-authored.
        - `TestEveryCatalogArtifactHasGoldenTest` requires a `Test<Skill>Template` golden in
          `internal/project/spine_test.go`.
        - Chain-enabling fixtures derive from the catalog (`chainClosureConfig`), so a new
          chain skill joins them without a hand edit.

        Exemptions follow default-inclusion semantics (ADR-0080 Decision 7): every exception
        is an explicit entry that itself fails when stale.
    - title: "Hard-coded counts in domain narratives drift"
      domains: [adr-system]
      tags: [domain-staleness, convention-parts]
      body: |
        The domain current-state narratives (`.awf/domains/parts/*/current-state.md`) are free prose, so a
        spelled-out cardinal ("the nine chain-progression skills", "only the ten workflow-chain skills")
        is invisible to every deterministic check and goes stale the moment the catalog grows; a 2026-07-07
        currency sweep found three such stale counts from ADR-0067/0068 alone, in paragraphs the
        feature commits never touched. When a narrative must quantify the catalog, prefer count-free
        phrasing ("the `core`-flagged skills", "the chain-progression skills") or expect to sweep every
        count in the doc (not just the paragraph you are editing) whenever a chain artifact lands.
    - title: "README.md is outside the drift oracle"
      domains: [tooling]
      tags: [doc-standard, cli-dispatch]
      body: |
        `README.md` is hand-owned, not rendered, so `awf check` never flags it. Its command table and
        feature claims drift silently when the CLI grows (`awf new` and `awf commit-gate` shipped without
        README rows). Adding or changing a CLI command means updating the README table in the same
        change, per the docs-travel-with-the-change invariant; no deterministic check will remind you.
    - title: "`//go:embed` silently skips `_`- and `.`-prefixed paths"
      domains: [rendering]
      tags: [template-embed]
      body: |
        The project-local base templates live at `templates/skills/_base/SKILL.md.tmpl` and
        `templates/agents/_base.md.tmpl` (ADR-0068). Go's `//go:embed` walk **excludes** every file or
        directory whose name begins with `_` or `.` unless the pattern is `all:`-prefixed; so the bare
        `//go:embed skills agents ...` form embeds neither `_base`, and `fs.ReadFile(templates.FS, ...)` fails
        at render with a bare `file does not exist`. `templates/embed.go` therefore uses
        `all:skills all:agents`. Do not "simplify" it back: dropping `all:` silently drops the base
        templates. `TestUnsetFallbackRenders` reads both base templates from `templates.FS`, so a
        regression fails the gate, but the failure is a confusing missing-file error, not an obvious embed
        bug, hence this note.

        The same directive is an **explicit directory allowlist**, not a glob, so it has a second edge: a
        brand-new top-level template directory (a new singleton's `templates/<name>/`) is silently *not*
        embedded until its name is added to the `//go:embed` line. The symptom is identical; `awf sync`
        fails with `read template <name>/...: file does not exist` even though the file is on disk, because
        the source tree has it but the embedded FS does not. When adding a rendered artifact backed by a new
        `templates/` subdirectory, add the directory to `templates/embed.go` in the same change.
    - title: "Concurrent agents in one worktree share the git index"
      tags: [worktree-isolation, commit-gate]
      body: |
        Two agents working in the same checkout share one staging area: `git commit` commits the
        **whole index**, so another agent's `git add` between your `git add` and `git commit` sweeps
        their files into your commit (this bit the ADR-0069 session; a foreign 526-line plan file
        landed in a feat commit). Always pathspec-limit the commit itself (`git add <paths> && git
        commit -m ... -- <paths>`), so only your named paths land regardless of index state; note an
        untracked file must still be `git add`-ed first, a bare pathspec commit rejects it. Two more
        shared-tree symptoms: `awf audit`'s `uncommitted-changes` error fires on the *other* agent's
        dirty files (a false positive for your session; never commit or discard their work to appease
        it), and a pre-commit drift-gate failure may be their stale generated file; `./x sync`
        freshens the disk, then still commit only your paths. Recurred harder in the ADR-0088/0089
        dual session: pathspec discipline alone cannot make a commit *hermetic*; the gate validates
        the worktree, but the commit is a slice of the index, so a foreign hunk staged in a shared
        file (or a slice cut while the other session's symbol is unstaged) can land a commit that does
        not build on its own, breaking bisect (4ef80e0 carries a call to a function a later commit
        defines). The deterministic backstop is the `.githooks/pre-commit` staged-slice build: it
        checks out the index into a throwaway directory and runs `go build ./...` there, so a
        non-building slice refuses at commit time. The real prevention is one git worktree per
        concurrent session; when a shared tree is unavoidable, stage HEAD-plus-only-your-hunks
        versions of mixed files (write the merged file back to the worktree after `git add`) and
        verify the staged slice deliberately.

        A read-only subagent is not automatically safe in the shared tree: a plan reviewer in
        the ADR-0131 retrofit used the live repo as scratch and ran `git checkout` when it
        finished, discarding the main thread's uncommitted work along with its own. Index
        discipline does not help here, because nothing was staged. State the constraint in the
        dispatch prompt itself: the subagent works in its own `git worktree` and never runs
        `checkout`, `restore`, `stash`, or `reset` in the main repo. Ten dispatches across the
        2026-07-19 triage carried that mandate explicitly and all ten behaved, but repeating it
        per prompt is the weak link, since one forgotten dispatch is one destroyed working tree.
    - title: "A new var reference in a previously var-free template is adopter-visible"
      domains: [rendering]
      tags: [placeholder-degradation, publication-safety]
      body: |
        Referencing a `{{ .vars.* }}` value in a template that referenced none before changes more than
        the prose: every adopter without that var set starts seeing an ADR-0045 unset-var advisory for
        the artifact on `awf check`/`awf init`. awf's own repo sets the common vars (`gateCmd` etc.), so
        the edit looks silent here and the new advisory only surfaces downstream. Before adding a var
        reference, decide whether the sentence really needs it; generic wording avoids the advisory
        entirely (this kept `gateCmd` out of the plans README when the self-contained-phases rule
        landed), and if it does, keep the `{{ with }}...{{ else }}` fallback publication-safe and accept
        the advisory as intended signal.
    - title: "A `data:` list override replaces the catalog defaults wholesale"
      domains: [config]
      tags: [sidecar-fields, kind-descriptor]
      body: |
        Setting a list key in an artifact's `.awf/<kind>/<name>.yaml` `data:` block (e.g. the
        plan-reviewer's `focusItems`) replaces the catalog's default list; it does not append. Adding
        one project-local focus item this way silently dropped the two default items
        (`step-exactness`, `dependency-order`) from this repo's rendered reviewer for a day, and
        nothing flagged it: the render is drift-clean because the config said exactly that. When adding
        a project-local list entry, copy the catalog defaults you still want into the override
        alongside it (they live in `internal/catalog/standard.go`), and eyeball the rendered diff for
        deleted default lines before committing.

        **The reverse direction is worse, and this entry did not state it until it bit (ADR-0116,
        2026-07-15).** Adding a *new catalog default* to a list is invisible to every project that
        overrides that list: the default ships to adopters and is silently dropped for the
        overriding project. ADR-0116 added a `docCurrencyItems` entry to the `adr-reviewer` catalog
        default and cited *this pitfall* as the reason to edit the catalog rather than an override,
        without noticing `.awf/agents/adr-reviewer.yaml` already overrode that very list. The rule
        would have reached every adopter except awf itself, the one project meant to dogfood it,
        with a green gate and a clean `awf check` throughout; the ADR reviewer caught it. So the
        rule is bidirectional: **a `data:` list has as many sites as there are overrides of it.**
        Before adding a catalog default, `grep -rn '<listKey>' .awf/` and mirror it into every
        override found (restate it deliberately, as `.awf/agents/code-reviewer.yaml` does in a
        comment); before adding a local entry, copy the defaults you still want. Verify by reading
        the *rendered* artifact for each affected project, `examples/sundial` included, not the
        config.
    - title: "Registry-relative constants in migration code drift"
      domains: [config]
      tags: [schema-migration, version-authority]
      body: |
        `migrate.Generation` returned `Current()-1` for a lockless pre-relocation tree, correct when
        the To:3 relocation was the newest migration, silently wrong once To:4..6 registered: the tree
        gated forever while `awf upgrade` applied only post-relocation no-ops (fixed 2026-07-07). A
        generation pinned relative to the *growing* registry moves with every new migration, but a
        layout detected by shape sits at a *fixed* point in history; pin the absolute generation (a
        lockless `.claude/awf/` tree is the tree-layout port's output, so 1). Treat any `Current()±k`
        in migration or versioning code as a red flag unless k describes the current head by
        definition. Since ADR-0076 the sentinel generations apply only to genuinely *absent* locks:
        a present-but-unreadable lock is a hard error from `Generation` (and every other lock
        reader), never `Current()`/`1`; so a corrupt lock can no longer silently bypass the schema
        gate the way a mispinned sentinel once mis-gated a healthy tree.
    - title: "Binary-side render changes do not reflag rendered outputs"
      domains: [rendering]
      tags: [render-completeness, version-authority]
      body: |
        `awf check` hashes config bytes and template bytes; a change to the *Go render logic*
        (a new render key, a changed derivation like `taskSkills`) alters what a fresh render
        produces while every hash still matches, so check stays clean over now-stale outputs. This
        shipped a stale AGENTS.md mid-review on 2026-07-07: the commit changed the derivation but the
        rendered guide was produced by the intermediate version, and nothing flagged it. The gap is
        deliberate (ADR-0039 keeps `.version` out of the config hash; a binary upgrade advises
        "run awf sync" as a note instead of failing). The discipline: any commit that changes render
        output for unchanged config/templates must run `./x sync` *after the final code state* and
        commit the refreshed outputs; verify by grepping the rendered file for the change, not by
        trusting a clean check.
    - title: "Documenting a literal `{{=awf:key}}` token in the agent guide trips the render-guide brace check"
      domains: [rendering]
      tags: [placeholder-degradation, agents-guide]
      body: |
        `internal/project/guide_scopes_test.go`'s `renderGuide` helper rejects any `{{` or `}}` in the
        rendered agent guide as an unrendered template action. A guide default that documents a literal
        awf placeholder token renders real braces into the guide (e.g. a bullet mentioning
        `{{=awf:sectionDefault}}`), which trips that guard even though the braces are intentional
        content, and it surfaces as a `TestGuideScopesDerived` failure, not an obvious match for a doc
        edit. This bit ADR-0072, whose plan specified embedding the full token in the override bullet.
        The honest fix is to reference the placeholder by its bare key name in the guide
        (`` `sectionDefault` ``) and leave the full token syntax to `working-with-awf.md`, whose render
        path tolerates it; the guide is a pointer, that doc is the reference. If the guide must show the
        full token, strip `awfPlaceholderRE` matches before the brace check rather than deleting the
        guard. (This very entry backslash-escapes its tokens because the pitfalls doc is itself a raw
        convention part run through the same substitution.)
    - title: "A dispatched fix-applying subagent sometimes commits on a new branch, not `main`"
      tags: [subagent-dispatch]
      body: |
        A dispatched subagent that applies fixes as commits, the implementer subagents in
        `<prefix>-subagent-driven-development` (as of ADR-0074 the review subagents are report-only and no
        longer commit), occasionally creates a `resync/...` or `review/...` branch and commits there instead
        of on the working branch (`main`), leaving the main-thread session behind by those commits (seen
        with a resync agent's `89a80c9` on 2026-07-07, and earlier during the ADR-0064 effort). It surfaces as
        `git branch --show-current` returning an unexpected branch after a subagent returns, or the
        reviewer reporting a commit SHA that `git log` on `main` does not show. Reconcile before
        continuing: `git checkout main && git merge --ff-only <branch> && git branch -d <branch>` (the
        branch is normally `main` plus the fix commits, so the fast-forward is clean; if it is not, the
        subagent also diverged and you must inspect). Prevention is partial; the dispatch brief can say
        "commit on the current branch; never create a branch", so always verify the branch after a
        fix-applying subagent returns rather than trusting it stayed put.
    - title: "Enabled linters constrain API shape, sketch signatures against them"
      domains: [tooling]
      tags: [static-linting]
      body: |
        An ADR- or plan-sketched Go signature can be unimplementable as written: the `nilnil` linter
        forbids returning a nil pointer beside a nil error, so a "missing → `(nil, nil)`" empty-state
        API must carry a `found bool` (or a sentinel error) instead; discovered mid-execution on
        ADR-0076's `manifest.LoadOptional`, forcing an amendment-while-Proposed after the signature
        had survived two reviews. `errorlint` (wrap with `%w`, no `!=` on errors) and `perfsprint`
        (no zero-arg `fmt.Errorf`) similarly bite embedded plan code at commit time. When a design
        artifact pins an exact signature or error string, check it against `.golangci.yml`'s enabled
        set before the plan freezes; the plan-reviewer's gate-clean-embedded focus covers what it
        enumerates, not novel linter/API interactions.
    - title: "Growing a pinned set breaks exact-assertion tests the change forgot to enumerate"
      domains: [config]
      tags: [pinned-set-tests, schema-migration]
      body: |
        Several gate tests deliberately pin a *complete current state*: `TestCurrentIsSeven` pins the
        migration registry head, `TestUpgradeAppliesInOrderIdempotent`/`TestUpgradeStampsTreeLock` pin
        the exact applied-migration list (assertion string **and** the `t.Errorf` want-list message;
        the ADR-0077 session fixed the strings and still shipped stale messages), and the config
        validation tests pin what the validators accept. Adding a migration, changing a default
        set, or bumping the version therefore reds the gate in places far from the edit. When planning
        such a change, grep for the pinned tests up front (`Current()`, the applied-list literal, the
        version const) and enumerate each update as a plan task; the ADR-0077 plan review found four
        of these as blockers precisely because the plan hadn't.
    - title: "A milestone-time check must not double as an every-commit test"
      domains: [tooling]
      tags: [release-pipeline, changelog]
      body: |
        `cmd/releasecheck` (ADR-0078) holds a condition that is *supposed* to be false mid-cycle: the
        exact changelog pin only has to be true at tag time, and a normal in-cycle repo carries a
        non-empty `[Unreleased]`. An early draft of its test suite ran the real check against the live
        embedded changelog in the ordinary gate run, with a skip for only one of the two mid-cycle
        failure modes, which would have silently re-imposed the every-commit pin the ADR exists to
        remove, reddening the gate on the first in-cycle changelog entry (caught before commit,
        2026-07-08). When a check's whole point is to hold only at a milestone (a tag, a release, a
        schema migration), its unit tests belong on synthetic fixtures; the live repo state is input
        for the milestone gate alone.
    - title: "gofmt rewrites double backticks in doc comments into curly quotes"
      domains: [tooling]
      tags: [gofmt-doccomment]
      body: |
        Go's doc-comment normalization (gofmt since Go 1.19) treats a literal double-backtick pair in
        a doc comment as the old quoting convention and rewrites it to a curly quote (`“`); so a
        comment trying to *depict* markdown double-backtick spans gets silently mangled into wrong
        typography, and restoring the backticks verbatim just re-triggers the rewrite (hit twice on
        2026-07-09 while landing ADR-0080's sweep). In a doc-comment position, spell the construct out
        in words ("a double-backtick quoting span"); literal backtick pairs are only safe inside
        non-doc comments or raw strings.
    - title: "Topic and decision edits regenerate navigation outside the authored file"
      domains: [adr-system]
      tags: [topic-navigation, adr-lifecycle]
      body: |
        `./x sync` regenerates `docs/decisions/INDEX.md` from the ADR corpus and regenerates topic
        indexes plus owning domain-doc navigation from topic metadata. Stage from `git status`, not
        from a memorised authored-file list: a status transition can move the decision index, while
        a topic add, rename, or metadata change can move both its topic index and domain doc. The
        older per-domain ADR-index implementation exposed the same rendered-file staging class when
        an ADR-0080 flip missed an index-only domain-doc refresh (2026-07-09). It recurred in
        ADR-0121's phase 1 when a configspec edit omitted the example adopter's regenerated config
        reference. The `.githooks/pre-commit` staged-slice validation now drift-checks
        `examples/sundial` too, providing a deterministic net for repo and example outputs, but the
        complete sync transaction must still be staged before the explicit staged check and gate.
    - title: "The atomic `.awf/awf.lock` forces multi-scope rendering work into one commit"
      domains: [rendering]
      tags: [lock-manifest, commit-gate]
      body: |
        `.awf/awf.lock` is a single JSON manifest of every rendered file's hashes, so a change that
        regenerates outputs across several commit *scopes*, skill templates (`rendering`), an ADR flip's
        domain indexes (`adr`), an `agents-doc.yaml` invariant promotion (`invariants`), produces one
        lock diff whose hunks cannot be sliced by pathspec: `git add <path>` is all-or-nothing on a file
        and interactive `git add -p` is unavailable here. Don't fight it into per-scope commits; the
        coupled regeneration *is* the concern. Bundle the source edits, their rendered outputs, and the
        whole lock into one commit; "one concern per commit" is satisfied because the concern is the
        coupled change, not each scope it happens to touch (ADR-0092 stage b, 2026-07-11: skill adoption
        + ADR flip + invariant promotion landed as one `feat(rendering)` commit; the impl review
        confirmed the boundary was reasoned, not a scope violation). A genuinely independent, non-rendered
        file (a `./x` arm, a lockless script) still commits on its own.
    - title: "Obsoleting rendered prose: sweep parts and whole narratives, not just templates"
      domains: [rendering]
      tags: [convention-parts, template-overlay]
      body: |
        Fixing a template's default sentence does not reach a project whose convention part
        *overrides* that section; awf's own `.awf/parts/agents-doc/awf-setup.md` kept ADR-0081's
        obsoleted "disable them as a unit" instruction past the template rewrite, a sync, and three
        review passes (caught only by the impl review's dogfood check, 2026-07-09). The same session
        also left a domain current-state narrative self-contradicting by *appending* the correction
        while an earlier clause still asserted the old behavior. When a change obsoletes prose, grep
        the repo for the phrase being retired (`templates/`, `.awf/**/parts/`, and the rendered
        outputs will surface every carrier, parts included) and rewrite stale clauses in place;
        an appended correction beside a surviving old claim is worse than either alone.
    - title: "An empty scan result only counts once the probe provably ran"
      tags: [verification-discipline]
      body: |
        A compound shell command that errors mid-sequence silently drops every later segment: a
        `grep A; echo ---; grep B` probe whose separator failed to parse never ran the second grep,
        and its missing output was read as "no matches; templates carry no repo-identity literals"
        (2026-07-09, ADR-0082 brainstorm). The false premise shaped a design decision and survived
        until a fresh-context grounding check re-ran the scan and found two hits. Absence of output
        is not verified absence: run verification probes as separate invocations (or with an
        explicit sentinel/exit-code check), and treat any scan whose success path you did not
        observe as unrun, not clean.
    - title: "A narrow pattern is a silent undercount, not a clean scan"
      domains: [tooling]
      related: [116]
      tags: [verification-discipline]
      body: |
        The sibling entry above covers a probe that never ran. This is the variant where the probe
        runs perfectly and still lies: the pattern is narrower than the thing it is looking for, so
        it returns a real number that is simply too low, and a low number reads exactly like a
        thorough scan. It bit three times in one session (ADR-0116, 2026-07-15). A
        `grep "only allowed edit"` missed `only allowed **in-place** edit`, so an ADR claimed five
        surfaces contradicted it when seven did, and shipped that count through two review passes.
        A `grep "related..names this ADR"` (two dots where the text needed three) returned `0` for
        files that visibly contained the string, nearly concluding a just-rendered rule had not
        rendered. And three independent corpus sweeps for partial amendments each returned a
        different, each-time-too-low count (16, then 19), because all three were verb-anchored and
        prose does not agree on the verb.

        The trap is that a narrow pattern fails *safe-looking*: nothing errors, the output is
        plausible, and the number becomes load-bearing (a Decision item's enumeration, a measured
        compliance rate). The cheap defences, in order: make the pattern **wider than you think you
        need** and discard by eye rather than narrowing up front (`grep -iE "only.*edit"` beats
        guessing the adjective); **corroborate a zero or a suspiciously round count with a second
        probe of a different shape** before it becomes a claim; and when a count reaches a document,
        **write it as a floor** ("at least N"), because the next sweep will find more. If a
        quantity is load-bearing, the enumeration is the work: iterate the whole population and
        route each element to an asserted bucket, the same discipline the attribute-filtered
        pinned-set entry demands of tests. Reviewers are the backstop that actually caught all
        three here, so state counts in a form a reviewer can re-derive.
    - title: "A coverage-ignore justification is stale the moment its line is refactored"
      domains: [tooling]
      tags: [coverage-gate]
      body: |
        A `coverage-ignore` comment asserts a reachability claim about the code shape it was written
        against; a refactor that merges call sites, changes a signature, or widens who runs the code
        invalidates the claim silently while the comment rides along verbatim. The schema-6 migration
        rework (2026-07-09) carried three pre-existing ignores through exactly such a refactor; the
        "fresh trees" justification was already false for a partial-prior-migration adopter tree, and
        ENOTDIR/EISDIR reached the "permission fault only" branches with no permissions involved; the
        impl review refuted all three (plus a fourth on a directed probe) by staging the state each
        declared impossible. When an edit touches a line carrying an ignore, the ignore is part of
        the edit: re-probe the claim (try to stage the "impossible" state, a leftover destination
        file, a path component as a regular file, a config path as a directory) or drop it and cover
        the branch; `./x audit-local`'s `coverage-ignore-added` warning flags every touched ignore in
        the range for exactly this re-evaluation. A fourth recurrence (ADR-0088) sharpened the
        heuristic: an ignore claiming "X already exercised this, so it cannot fail here" is false
        whenever the guarded call consumes an input X never touched; five "cannot fail after
        RenderAll succeeded" ignores guarded the generated config reference, whose intro convention
        part RenderAll never reads because the reference renders outside it; a directory staged at
        the part path reached every one. A fifth recurrence (the 2026-07-10 worktree fix) refuted an
        "only a delete race loses it" claim on a read-after-stat: file *permissions* are the standard
        refuting move for any "stat just succeeded, so the read cannot fail" shape; a `chmod 0o000`
        file stats fine and fails the read deterministically (guard the test with a
        `os.Geteuid() == 0` skip, since root bypasses it). A sixth recurrence (the 2026-07-20 bridge
        Phase 3) shipped a "a journaled path reads cleanly unless a concurrent removal races" ignore on
        the journal rollback read; the branch is reached deterministically by a directory sitting at
        the lock path during a halted rollback (EISDIR, no race), and an existing failure-injection
        test already executed it - so the ignore was not merely stale but false over a line the profile
        counted as covered. That the impl-review focus item still did not stop it at write time is the
        signal to climb a rung: a mechanical "a `coverage-ignore` line the coverage profile records as
        executed is a false ignore" check in `cmd/covercheck` would catch this whole ignored-but-covered
        class deterministically (deferred follow-up).
    - title: "An attribute-filtered pinned-set test exempts every other attribute value"
      domains: [tooling]
      tags: [pinned-set-tests, invariant-backing]
      body: |
        A pinned-list test that selects its population by an attribute (`if d.Kind == "string"`)
        pins only that slice: anything added under a different attribute value bypasses the pin
        entirely while the invariant it backs claims the whole set is closed. The first
        `var-descriptor-set-pinned` backing test (2026-07-09, ADR-0084) filtered descriptors by
        `Kind == "string"`, so a prose knob reintroduced as `Kind: "enum"` would have passed both
        descriptor-parity and the pin without the successor ADR the invariant exists to force; the
        impl review caught it the same day. When a pin means "this set is closed", enumerate the
        partition exhaustively. Iterate everything, route each element to an asserted bucket
        (pinned set, known-exempt set), and fail on any element that lands in neither, instead of
        filtering to the bucket you thought of first.
    - title: "A proof marker does not prove every clause in its invariant claim"
      domains: [invariants]
      tags: [invariant-backing]
      body: |
        The backing checker proves that a test-scoped marker exists, not that the marked test
        exercises every clause of the claim. ADR-0143's first implementation had markers for all
        nine changed invariants, yet several tests covered only one lifecycle status or direction;
        one append-only test even repeated an operation in cases labeled valid. Per-task review had
        already asked for stronger proof coverage, but the terminal Phase 4 review still found the
        same pattern across cutoff routing, abandonment, bidirectionality, atomicity, and sequence
        ordering. When adding or moving a proof marker, read the claim as a conjunction and enumerate
        each status, direction, and failure branch it names. Include at least one refuting case per
        clause; marker presence and a green suite are not evidence of semantic completeness.
    - title: "A Proposed ADR's same-commit state-doc update must not speak in present tense"
      domains: [adr-system]
      tags: [adr-lifecycle, domain-staleness]
      body: |
        The proposing step updates the shifted domain's current-state doc in the ADR's own commit,
        but the ADR is still `Proposed` there; writing "the four prose knobs are removed" while the
        catalog still carries all four makes the state doc false until implementation lands, and
        permanently false if the ADR is rejected (ADR-0084 review, 2026-07-09). Write the
        propose-commit sentence in decision tense anchored to the status, "ADR-NNNN (Proposed)
        narrows the policy ... and will remove ...", and flip it to present tense in the
        implementation commit that makes it true, alongside the status flip.
    - title: "Retiring an invariant claim couples the marker edit to the ADR's Implemented flip"
      domains: [invariants]
      tags: [invariant-retirement, adr-lifecycle]
      body: |
        A `Backing: test` invariant claim must stay backed by its proof marker until the ADR's
        `remove` (or backing-changing `update`) operation applies, and that happens only in the
        transaction that flips the ADR to `Implemented` (`awf check --staged` verifies the claim
        mutation and the ADR flip together). So a commit that removes or renames the proof marker
        cannot land while its ADR is still Proposed, and the green-gate-per-commit rule then forces
        the marker edit and the ADR's `Implemented` flip into one commit. The ADR-0085 implementation
        (2026-07-10) planned "feature commit, then flip commit" and hit the legacy form of this at the
        first `./x check`. When an effort removes or retargets an invariant claim, plan the final
        implementation commit to include both the claim mutation and the ADR status flip from the
        start.
    - title: "An unescaped consumable placeholder in a part is silently rewritten, check-clean"
      domains: [rendering]
      tags: [placeholder-degradation, convention-parts]
      body: |
        The guide-brace-check entry above covers a token tripping a test; the worse variant trips
        nothing. A convention part that *documents* a consumable placeholder (`{{=awf:gateCmd}}`,
        `{{=awf:checkCmd}}`) without the backslash escape gets substituted like any other part:
        the rendered doc shows the var's *value* where the token *name* belongs, `awf check` stays
        clean (the output is exactly what the config produces), and only a human reading the
        rendered file notices. Bit the ADR-0086 docs commit (2026-07-10): the rendering domain's
        current-state part quoted both tokens bare while the same file escaped
        `{{=awf:sectionDefault}}` two sentences earlier. Machine-checking this is off the table (
        substituting inside backticks is also a legitimate pattern), so it is promoted to a
        code-review focus item (`part-placeholder-escaping`): quoted-as-syntax means escaped,
        meant-to-resolve means bare, and verify by reading the rendered file, not the part.
    - title: "Moving a check earlier in the pipeline steals a later stage's error-branch coverage"
      domains: [tooling]
      tags: [coverage-gate]
      body: |
        A fixture that corrupts state up front (a directory where a sidecar file belongs, an
        unreadable file) to pin a *late* stage's error propagation silently changes meaning when a
        new earlier stage starts reading the same state: the error now surfaces there, the late
        branch goes uncovered, and the 100% gate flags a line nobody edited. ADR-0086's open-time
        domain-sidecar validation did this to `TestAuditPropagatesDomainSidecarReadError`;
        (2026-07-10) Audit's read-error branch was suddenly unreachable from a pre-corrupted
        tree. The repair pattern: corrupt *after* the earlier stage has run (post-`Open`
        mutation), so each stage's own error branch keeps a test that reaches it; and when adding
        an earlier check, grep the tests for fixtures corrupting the state it newly reads.
    - title: "Parallel sessions share one git index"
      tags: [worktree-isolation, commit-gate]
      body: |
        Two agent sessions (or an agent and a human) working in the same checkout share the staging
        area: a bare `git commit` after `git add <own files>` commits the *whole index*, silently
        sweeping whatever the other session had staged; it happened between the ADR-0087 and
        ADR-0088 efforts (2026-07-10), folding one effort's staged review fixes into the other's
        feature commit. Repair: `git reset --soft HEAD~1`, then re-commit with an explicit pathspec
        (`git commit -m ... -- <paths>`), which also leaves the foreign entries staged exactly as
        found. Prevention: when a `git status` shows staged entries you did not stage, commit with a
        pathspec (tracked files only; stage a brand-new file first) or move one effort to a
        worktree; also prefer targeted reverts over `git checkout <file>` while your own edits are
        uncommitted, which is how a verify-mutation revert erased a just-written test the same day.

        **This recurred within hours of being recorded** (same day, opposite direction: the
        ADR-0088 session's feature commit swept the ADR-0089 effort's `render.go` hunks, leaving a
        commit that does not compile standalone; green-gate-per-commit is unenforceable across a
        shared tree because the hook validates the *tree*, not the commit). Pathspec discipline
        cannot separate two efforts' hunks inside one file, and prose did not prevent the second
        occurrence. The real rule: **parallel sessions get separate git worktrees, full stop.** A
        shared checkout is single-writer; the moment a second effort starts, move it
        (`git worktree add`) or serialize.

        **Third occurrence, 2026-07-19, in a direction the first two did not cover.** A concurrent
        session did not merely add to the index, it reverted an uncommitted edit off disk between
        one commit's gate run and the next. The result was a commit whose message described an ADR
        amendment the commit did not contain: only the test half landed, leaving a proof marker
        asserting the opposite of the invariant sentence it was marked as proving. The gate could
        not see it, because prose is not gated and the *tree* was green both times. The same
        session's in-progress ADR was swept in by a `git add -A`, which AGENTS.md forbids in as
        many words and which is what let the mismatch pass unnoticed.

        So the rule has a second half: **stage named paths, and verify what the commit CONTAINS,
        not just that the gate was green.** `git show --stat HEAD` after committing costs nothing
        and is the only thing that catches an edit lost to another writer. A green gate before the
        commit proves the tree was good at that instant; it says nothing about what got captured.
    - title: "Link ADRs by their on-disk filename, never by constructing one from the title"
      domains: [adr-system]
      tags: [cross-references, link-resolution]
      body: |
        An ADR's kebab filename is derived from its title at `awf new adr` time, but retellings
        drift ("convention-parts-raw-not-templated" vs the actual "convention-parts-are-raw-input");
        three invented link targets landed in ADR-0087's first draft (2026-07-10) and survived to
        the verify pass because the ADR-0020 dead-link scan covers awf-managed *rendered* docs
        only, not `docs/decisions/`. `ls docs/decisions/ | grep <number>` first, then link.
    - title: "`adr.ADR.Title` already carries the `ADR-NNNN: ` prefix"
      domains: [adr-system]
      tags: [adr-parsing, context-query]
      body: |
        `adr.ParseDir` reads `Title` verbatim from the `# ADR-NNNN: ...` heading, so it includes the
        `ADR-NNNN: ` prefix while `Number` carries the digits separately. A new consumer that prints
        both, as `awf context`'s `ADRRef` did in its first draft (2026-07-11), double-prints the
        number (`ADR-0092 ... ADR-0092: Title`); plan review caught it. Strip the prefix
        (`strings.TrimPrefix(a.Title, "ADR-"+a.Number+": ")`) when surfacing Title alongside Number.
        `awf context` was the first `adr.ParseDir` consumer outside `internal/{adr,invariants,audit}`,
        so the gotcha only surfaces as awf grows ADR-aware tooling.
    - title: "Repo opens must resolve the `.git` gitfile (use `internal/git.OpenRepo`)"
      domains: [tooling]
      tags: [repo-open]
      body: |
        In a linked worktree (`git worktree add`), and the submodule layout, `.git` is a
        `gitdir:` pointer file, not a directory; a naive `<root>/.git` filesystem open dies with
        `open repo: ... .git/config: not a directory` (bit `awf audit` 2026-07-10, running the
        ADR-0090 impl review in a session worktree; every parallel session uses one). Fixed the
        same day: `OpenRepo`'s `dotGitFs` resolves the pointer and routes shared state through the
        `commondir` via `dotgit.NewRepositoryFilesystem`, mirroring go-git's
        `EnableDotGitCommonDir`; regression tests hand-craft the worktree layout (go-git cannot
        create one). The standing rule from the first entry above still governs: any future
        awf code opening a repo goes through `internal/git.OpenRepo`; `git.PlainOpen` gets neither
        the extensions workaround nor the gitfile resolution. (The helper lived in `internal/audit`
        until ADR-0092's stage-a extracted it into the shared `internal/git` package.)
    - title: "Section parts carry their own heading"
      domains: [rendering]
      tags: [convention-parts, section-assembly]
      body: |
        A convention part replaces its section's *body*, and for most doc/guide sections the
        `## Heading` line lives inside that body; a part written without it renders a headless
        section (ADR-0090's identity part landed headingless on first sync; only comparing the
        rendered file against this repo's own parts caught it). When authoring a part, check the
        section's default (or an existing adopter's part) for whether the heading is yours to write.
        No note fires: the stub advisory clears the moment the part exists, whatever its shape.
    - title: "Verify compound-chain side effects by reading the target back"
      tags: [verification-discipline]
      body: |
        A `cd <dir> && <edit>` chain silently skips the edit when the `cd` fails (wrong cwd
        assumption across tool calls), while an unchained command later in the same block still
        runs and succeeds; the block "worked", green output and all, minus the one side effect
        that mattered (an `invariants:` config append vanished this way in the ADR-0090 session;
        only `tail`-ing the file exposed it). After any compound chain that edits state, verify the
        target's content, not the block's exit status.
    - title: "Hand-rolled repo enumeration crosses repository boundaries"
      domains: [tooling]
      tags: [repo-open]
      body: |
        Anything that walks or opens the repo tree itself must define its repository boundary;
        the Go toolchain gets this free (dot-dirs and nested modules are invisible to `./...`),
        hand-rolled walkers and repo opens do not. Three independent instances bit on 2026-07-10
        alone: `awf audit` could not open a linked-worktree checkout (`.git` gitfile, the entry
        above), `TestLoadReadsTreeRoot`'s legacy-ref sweep flagged `internal/migrate` copies
        inside `.claude/worktrees/` session checkouts, and the invariants scanner let markers in
        nested checkouts silently back this project's slugs; the worst shape, a false green in
        both directions. The rule: a filesystem walk prunes any subdirectory carrying its own
        `.git` entry (directory in a primary clone, gitdir-pointer file in a worktree or
        submodule) and takes a deliberate stance on hidden directories; a repo open resolves the
        gitfile layout; enumeration derived from git history (commit diffs, `git ls-files`) is
        immune by construction and preferred where it fits.
    - title: "An `invariant:` backing marker must open its own line, not trail a statement"
      domains: [invariants]
      tags: [invariant-backing, marker-scoping]
      body: |
        The current-state marker scanner (`internal/topic`) matches a claim id only when the marker
        opens its line after indentation; `strings.TrimLeft(line, " \t")` must start with the
        configured marker, then `invariant: <domain>/<topic>:<slug>`. This is deliberate: a mid-line
        match could sit inside a string literal (a test fixture's source-code string) and falsely back
        a claim. The consequence is a natural-looking backing that silently does not count: a trailing
        `clone.Docs = maps.Clone(...) // invariant: <domain>/<topic>:<slug>` reads as *unbacked*, and
        the gap hides until the claim is loaded or the ADR's `remove`/`update` operation is staged,
        exactly when the effort is trying to conclude. Put the `// invariant: <domain>/<topic>:<slug>`
        on its own line directly above the statement it describes.
    - title: "Relocating a cross-cutting guard out of a shared helper drops it for internal callers"
      domains: [tooling]
      tags: [cli-dispatch, version-authority]
      body: |
        `gate()` (the binary-version guard) was applied *transitively*: `runSync` gated at its top,
        so every command that chained `runSync` (including the `Ungated` `init` and `upgrade`)
        inherited the refusal without a direct `gate()` call. Moving the gate up to the parse-once
        driver (ADR-0094) removed it from `runSync`; the top-level `sync` command stayed covered by
        the driver, but `init`/`upgrade` (Ungated, gating only through their chained sync) silently
        lost it; `awf init` on a schema-behind tree re-stamped the current schema over an unmigrated
        config instead of refusing "run awf upgrade". The transitive gate was real but *untested*, so
        the reclassification looked complete and the gap survived to the review step. When you relocate
        a guard out of a shared helper, enumerate every *internal* caller of that helper (not just the
        top-level entry point you are reclassifying) and add a per-caller test for each one that still
        needs the guard. `SyncReport`'s corrupt-lock refusal is not a substitute: it catches a corrupt
        lock but not a schema- or version-behind one, which only `gate()` sees.
    - title: "A plan editing a catalog template or default under-enumerates the render fan-out"
      domains: [rendering]
      tags: [render-completeness, multi-target, example-adopter]
      body: |
        A plan whose diff touches a shipped template (`templates/**`) or a catalog default
        (`internal/catalog/standard.go`) naturally lists the one `.claude/` output the author is looking
        at, and misses the rest of the fan-out. One source edit re-renders **every enabled target**
        (`.claude/` *and* `.pi/` here), **both** `.awf/awf.lock` files (root *and* `examples/sundial`),
        and the example adopter's own outputs; and because the change is adopter-facing, it also owes an
        `[Unreleased]` entry in `changelog/CHANGELOG.md`. In the ADR-0095 session all three slipped: the
        plan's `git add` named `awf-writing-plans` under sundial (which renders `sundial-writing-plans`,
        prefix `sundial`), omitted the `.cursor/` output and the example lock, and scheduled no changelog
        task; caught downstream by plan review, by reading `git status`, and by `./x audit-local`
        respectively, not up front. Two lessons: when a plan edits a catalog artifact, enumerate the fan-out
        explicitly (all targets × {root, example} × {rendered, lock}, plus a changelog task), and at
        execution treat the plan's `git add` list as a *floor*; run `./x sync`, then stage exactly what
        `git status --short` reports, adding paths the plan forgot rather than only dropping ones it
        over-named.

        **Recurred (ADR-0103, 2026-07-13)** despite this note: adding one `internal/configspec` entry
        regenerates `examples/sundial/docs/config-reference.md` too, but the Phase-3 commit staged only
        the root reference, leaving the example regen for a follow-up commit and three intermediate
        commits `./x check`-red at checkout. The root cause the prose above missed is why staging
        discipline alone keeps failing here: a hook that validates the *working tree* (where the
        preceding `./x sync` has already written the example file) cannot see a regenerated-but-unstaged
        output, so the commit passes the hook while being drift-red on its own.

        **The deterministic backstop now exists** (34d839c, 2026-07-15): `.githooks/pre-commit` checks the
        index out into a throwaway tree and runs `./x check` there alongside the `go build` staged-slice
        check (ADR-0088), so a commit missing a rendered, lock, or config hunk refuses at commit time.
        Two limits keep the up-front discipline load-bearing rather than redundant. It is **repo-local**:
        the staged-slice logic lives in awf's hand-maintained `.githooks/` stub, while the rendered payload
        adopters get (`.awf/hooks/pre-commit.sh`) still checks the worktree, so an adopter hitting this
        fan-out has no backstop at all. And it fires **late**, after the commit message is written, telling
        you a hunk is missing but not which fan-out arm you forgot. So: when a plan edits a catalog
        artifact, still enumerate the fan-out up front, and after `./x sync` stage **every** path
        `git status --short` reports, `examples/sundial` included.
    - title: "GoReleaser aborts on a dirty git tree; pre-release artifacts belong outside the worktree"
      domains: [tooling]
      tags: [release-pipeline]
      body: |
        `goreleaser release` runs a git-state validation that refuses a dirty tree, and *untracked* files
        count (`git status --porcelain` lists them as `??`). So any `release.yml` step that produces a file
        before the GoReleaser step must write it **outside the checkout**; `release.yml` extracts the
        curated release notes into `"$RUNNER_TEMP/release-notes.md"` and passes that absolute path via
        `--release-notes` precisely so the tree GoReleaser sees stays clean (ADR-0096). Writing
        `release-notes.md` into the repo root would have reddened the very release it was added to fix, a
        non-obvious coupling caught in ADR review, not by any local check (the failure only manifests on a
        real tag build). When adding a future pre-release step, keep its output under `$RUNNER_TEMP` or add
        the path to `.gitignore`; do not assume a build-time artifact in the worktree is harmless
        (2026-07-12).
    - title: "Sidecar `data` is not placeholder-substituted, drop `{{=awf:...}}` escapes when converting a part"
      domains: [rendering]
      related: [89, 99]
      tags: [placeholder-degradation, sidecar-fields]
      body: |
        A raw convention part is run through awf's `{{=awf:...}}` sandbox substitution before Go templating
        (ADR-0057), so a part that *documents* a placeholder token backslash-escapes it (`\{{=awf:key}}`)
        to render the literal token. A sidecar-derived doc's `data` value is different: the transform hands
        it to the template as a plain string spliced in via Go `{{ . }}`, with no awf-placeholder pass over
        it; so a `\{{=awf:...}}` escape copied verbatim from a raw part into `data.<key>` renders the
        backslash literally, and an unescaped `{{=awf:...}}` renders as the literal token (never substituted).
        This bit the ADR-0099 pitfalls conversion: the 40-entry hand-migration copied entries.md's escaped
        tokens straight into `data.pitfalls`, and the backslashes leaked into the rendered doc; `awf check`
        stayed clean (the output is exactly what the data says), so only diffing the rendered file against
        the deleted part exposed it. When converting a part-based doc to the sidecar model, strip the
        `\{{=awf:` escapes; verify by rendering and reading the output, not by trusting a clean check.
    - title: "A CLI command that re-Opens can't reach an assembly error Open already re-validates"
      domains: [tooling]
      related: [12, 92, 102]
      tags: [coverage-gate, cli-dispatch]
      body: |
        An `awf` command handler that calls `project.Open` and then a project assembly method (e.g.
        `runUncovered` → `Uncovered`) cannot reach an assembly error whose only source is state `Open`
        re-validates. `Open` runs `validateAgainstCatalog`, which reads every domain sidecar; so a
        malformed sidecar faults at `Open`, never at the later assembly call, making that assembly's
        `if err != nil { return err }` branch unreachable from the CLI and a legitimate `// coverage-ignore`
        (the assembly's own error stays covered at the project layer, where the test reuses one `Open`ed
        project). The escape hatch is an error source `Open` does NOT touch: `ContextFor` stays reachable
        because it also parses ADRs and plans. Before coverage-ignoring such a branch, confirm the assembly
        reads nothing beyond what `Open` validates (2026-07-13).
    - title: "A token or convention rename must sweep every rendered doc surface"
      domains: [invariants, rendering]
      tags: [cross-references, render-completeness]
      body: |
        Renaming a token or changing a convention breaks in more places than the authoring
        template. When `inv:`→`invariant:` landed, the doc-currency lens flagged stale `inv:`
        spellings three separate times (plan review, verify pass, resync) because the reword
        touched only the ADR template and the "Backed invariants" rule and missed sibling
        surfaces. Before committing a rename, sweep ALL rendered surfaces that mention the token
        or convention: `.awf/agents-doc.yaml` (AGENTS.md rules AND the `(inv: <slug>)` prose
        citations on every invariant bullet), `.awf/docs/glossary.yaml`, the domain
        `current-state.md` narratives and their citations, `.awf/docs/pitfalls.yaml`, the
        adr-readme part, and the architecture/working-with-awf guide sources, not just the one
        authoring template. A post-rename `grep -rnE '\b<oldtoken>' .awf/` reaching zero is the
        cheap catch (2026-07-13).
    - title: "A new config field needs a config-reference live-state projection case"
      domains: [config]
      tags: [config-reference]
      body: |
        `docs/config-reference.md`'s live-state column is projected per key by a switch in
        `internal/project/configreference.go` (`liveState`); a key with no `case` falls through to
        a `default` case that returns the `n/a` placeholder. `currentState.testGlobs` shipped its configspec entry and schema without a
        projection case, so the reference rendered the `n/a` placeholder (which reads as "unset") even once awf configured
        it, and `awf check` cannot catch this, because regeneration is idempotent, so the
        wrong-but-stable cell never drifts. The impl review caught it only by eye (2026-07-13). When
        adding a config field that carries a meaningful live value, add its `liveState` case (mirror the
        sibling, `currentState.testGlobs` mirrors `currentState.sources`) and assert the rendered value in a
        `configreference_test.go` case; an `n/a` placeholder for a set top-level field is the smell.
    - title: "Referencing a new var in an always-on template shifts that var's consumer set"
      domains: [rendering, config]
      tags: [config-reference, placeholder-degradation]
      related: [86, 88, 108]
      body: |
        Making a template interpolate `.vars.<x>` for the first time changes which artifacts *consume*
        that var, and if the template is a mandatory always-on singleton, the var is now consumed in
        every project, which two consumer-coupled surfaces encode: the config-reference "Consumed by:"
        golden line (`internal/project/configreference_test.go`) and the unused-var isolation test
        (`internal/project/unused_test.go` `TestPartPlaceholderConsumesVar`, whose premise that a var is
        otherwise-unused in its fixture breaks). ADR-0108 made the `plans-template` singleton reference
        `.vars.gateCmd`, and both tests failed at the gate; the grounding check, the ADR fan-out, the
        plan, plan-review, AND the resync all missed them; only `./x gate` caught it (2026-07-13). The
        render-fan-out sweep is about doc *outputs*; this is a distinct var-*consumer* fan-out. When a
        template starts referencing a var it did not before, grep the tests for that var
        (`grep -rn '"gateCmd"' internal/project/*_test.go`) and update the config-reference "Consumed by"
        golden; if an isolation test used that var precisely because it was unconsumed, switch it to a var
        still not consumed by any mandatory singleton (e.g. `checkCmd`).
    - title: "A code-fence info string chosen as a marker can collide with a Linguist alias"
      domains: [adr-system]
      tags: [plan-taxonomy, commit-gate]
      related: [111]
      body: |
        ADR-0111 marks a plan's planned commit subject with a ```commit fenced block. `commit` is
        not an arbitrary token: GitHub Linguist registers it as an alias of its "Git Commit" grammar,
        so ```commit is a real, highlighted language identifier. Two forces followed from that. (1)
        Keep `commit` rather than a namespaced `awf-commit`, so the block keeps its commit-message
        syntax highlighting; `awf-commit` is unknown to every highlighter. (2) Make the check fail
        *safe*: a ```commit block is validated by default (a real planned subject in the natural fence
        is caught, not silently skipped), with a second info-string token `awf-ignore` (```commit
        awf-ignore) as the per-block opt-out for a display-only example. Highlighting survives the
        opt-out because a highlighter selects the language from the info string's *first* token and
        ignores the rest. Lesson for any future fence-based marker: check the token against Linguist's
        language aliases (`lib/linguist/languages.yml`) before adopting it, and prefer a
        checked-by-default marker plus an explicit opt-out over a namespaced token that silently loses
        highlighting and fails open (ADR-0111; 2026-07-14).
    - title: "A new `awf check` note producer must be inert for the example adopter"
      domains: [tooling]
      tags: [example-adopter, publication-safety]
      body: |
        A new advisory note wired into `awf check` (a producer folded into
        `Project.AdvisoryNotes`) fires over whatever corpus the project has, including the committed
        example adopter `examples/sundial`, whose ADR-0090 `example-zero-notes` gate fails on *any*
        `note:` line. sundial carries free-form ADR/pitfall tags but no `tags:` vocabulary, so a
        tag-health note that keyed only off tag *presence* would fire there and redden the example
        check. Guard the producer on the opt-in config it governs; `tagHealthNotes` returns early when
        `len(p.Cfg.Tags) == 0`, so an un-curated adopter and the example stay note-free, mirroring how
        `tag-vocabulary-governed` is itself inert under an empty vocabulary. Any future advisory note
        must degrade to inert for a minimally-configured project, or `example-zero-notes` catches it
        (ADR-0109, ADR-0090; 2026-07-13).
    - title: "A render primitive proven against Markdown hides output-language gaps until a real target runs"
      domains: [rendering]
      tags: [editable-sections, provenance-markers, command-runner]
      body: |
        The in-place-editable-sections primitive (ADR-0100) was designed and unit-tested entirely
        against Markdown, then its first *shell* consumer (the managed runner `x`, ADR-0101) exposed
        two gaps invisible until a shell file was rendered *and executed/parsed*; each forcing a
        mid-implementation ADR amendment. (1) The `awf:edit`-family provenance pointers survive into
        output *as comments*, and an HTML `<!-- ... -->` pointer is a hard `bash` syntax error, so the
        pointers had to become comment-syntax-aware (`#` for a `#!`-shebang target, HTML otherwise;
        the same sniff `injectBanner` already used). (2) awf's sync wrote every file `0644`, but the
        runner is invoked as `./x`, so it had to be rendered executable. Both were invisible to
        `go test` (which never `bash -n`s or executes the rendered output) and to a Markdown-only
        mental model. Lesson: when a rendering primitive will serve a new *output language*, render a
        real target of that language and exercise it the way an adopter will (`bash -n`, execute,
        parse) before finalizing the ADR; Markdown's assumptions (HTML comments are inert, no execute
        bit) do not transfer, and the format-specific property (comment syntax, file mode, escaping)
        that must survive into output is the first thing to validate (ADR-0100, ADR-0101; 2026-07-15).
    - title: "A non-catalog config-tree render unit has a hand-wired fan-out the catalog table doesn't cover"
      domains: [rendering]
      tags: [render-completeness, closed-config-tree, template-embed]
      body: |
        A catalog skill/agent/doc rides a table-driven fan-out (enable array, catalog pool, render
        loop, sweep, checks), but a config-tree singleton rendered by a dedicated `RenderAll` block,
        the bootstrap, the hooks, and now the runner `x` (ADR-0101), must be wired *by hand* in every
        place the table would otherwise cover, and each omission surfaces far from the render block.
        Adding the runner touched, and each was easy to miss: the `//go:embed` directive
        (`templates/embed.go`, a template absent from the embed FS fails only at first render), the
        `RenderAll` block, the closed-tree sweep's claimed-path model (`buildClaimedModel`, an
        unclaimed `.awf/runner/parts` made a `create ... to override` pointer's own advice fail `check`,
        caught only in impl review), the `internal/configspec` entry + regenerated config-reference
        (ADR-0088 parity), and the nameless-singleton enable-CLI arm (`cmd/awf` hardcodes each
        singleton kind in the dispatcher, the toggle, `enableDisableSingleton`, `awf list`, and the
        unknown-kind message; five sites, no central list). Lesson: when adding a config-tree singleton, walk the full
        list (embed, render block, sweep claim, configspec/reference, enable CLI, example adoption)
        rather than trusting the render to surface the gaps (ADR-0101, ADR-0086, ADR-0088; 2026-07-15).
    - title: "`awf new adr` computes the next number from one tree, so parallel worktrees collide"
      domains: [adr-system, tooling]
      related: [42]
      tags: [adr-scaffolding, worktree-isolation]
      body: |
        `awf new adr` derives the next sequential number by scanning the *current* tree's
        `docs/decisions/`, so it cannot see a sibling worktree that has already claimed it. Two
        efforts running in parallel worktrees both get the same number and neither command fails:
        the collision only surfaces at merge, as two unrelated ADRs with one number. Hit
        2026-07-15: an `effort/adr-backpointer` worktree branched and took 0116, and a
        concurrent session's `awf new adr` minted 0116 again; the second was renumbered to 0117 by
        amending, which was only cheap because it was unpushed and provably exclusive to `main`
        (`git merge-base --is-ancestor`). Renumbering after a push is not cheap: the number is
        already cited by claim `Origin`/`Revised-by` metadata, `State changes` operations, and INDEX.md.

        Before scaffolding an ADR in a parallel-worktree session, check every branch, not just
        yours: `git branch --format='%(refname:short)' | while read b; do git ls-tree -r
        --name-only "$b" docs/decisions; done`. The command is the fallible half here; a
        cross-branch check is the reliable half. Fixing this inside `awf new adr` (scan refs, not
        just the worktree) is an open follow-up, deliberately not done as a drive-by.
    - title: "A post-check whose scope is wider than the change's scope is unsatisfiable"
      domains: [tooling]
      related: [115]
      tags: [verification-discipline, plan-taxonomy]
      body: |
        The two sibling entries above cover a probe that never ran and a probe whose pattern is too
        narrow. This is the variant where the probe runs, the pattern is right, and the *scope* is
        wrong: it reads a wider unit than the rule governs, so it counts grandfathered matches the
        change was never allowed to touch and can never reach its expected value. Satisfying it
        would mean violating the invariant the task exists to protect.

        ADR-0115's plan (2026-07-15) told task 5.1 to normalize an em-dash out of three ADR *heading*
        lines and change "nothing else in these files", then post-checked with
        `grep -lP '<banned>' docs/decisions/0007-*.md ... | wc -l` expecting `0`, on the stated
        premise that those three bodies "happen to carry no other banned codepoint". They carry 15,
        13, and 11. The check greps whole files, so it prints `3` forever; the only way to make it
        print `0` is to clean the bodies, which the same plan, the same ADR, and the append-only
        invariant all forbid. The heading-scoped check (`grep -hP '^# ADR-' ... | grep -cP
        '<banned>'`) prints `0` and is the one that matches the rule.

        The lesson is not "write better greps": it is that **a post-check is unverified prose until
        someone runs it**. This one shipped through plan review, a verify pass, and a plan-vs-ADR
        resync, all of which independently re-derived the em-dash *counts* and none of which
        executed the command. Grep at the granularity the rule governs (line, literal, heading), and
        when a task's scope is narrower than a file, say so in the probe rather than the prose
        around it.
    - title: "Source that is about the banned glyphs must type them as escapes, not literals"
      domains: [tooling]
      related: [119]
      tags: [verification-discipline, template-residue]
      body: |
        A file whose subject is the banned typographic substitutes (the scanner's rune map, a test
        fixture that plants an em-dash to prove the gate fires, an ADR example) is itself a tracked
        text file the `awf prose-gate` scan reads, so a literal glyph in it is a finding against the
        file that defines or tests the rule. Write the glyph as its Go escape (a backslash-u rune
        or string literal, which compiles to the real rune while the source stays ASCII), exactly as
        `internal/project/residue_scan_test.go`'s `bannedRunes` map and `internal/prosegate`'s
        `Banned` map both do; name it as `U+2014` in prose, config, or YAML.

        The trap is that an editor or a Write tool renders a `\u`-escape back as the glyph on screen,
        so a draft typed with real glyphs looks identical to the escaped version and the mistake is
        invisible until a codepoint probe (or the gate) flags it. This bit repeatedly across the
        ADR-0119 implementation: the scanner map and three separate test files were each first
        drafted with literal glyphs. The gate catches it on a tracked file at commit, but a
        work-in-progress file wastes a draft-then-convert cycle. Before writing a file that is about
        the glyphs, reach for the escape first; after, run
        `python3 -c "import sys;print(sum(c in chr(0x2014)+chr(0x2013)+chr(0x2026)+chr(0x2018)+chr(0x2019)+chr(0x201c)+chr(0x201d) for c in open(sys.argv[1]).read()))" <file>`
        and expect `0`.
    - title: "Raw-byte ADR surgery must bound every scan to the frontmatter window"
      domains: [config]
      related: [120]
      tags: [schema-migration, adr-parsing]
      body: |
        The generation-10 retirement-tokens migration and the `adr-retired-key` check edit or
        refuse ADR frontmatter as raw bytes, by regex. Two window bugs bit in one session. First,
        the last frontmatter line's terminating newline IS the newline that opens the closing
        fence (`\n---`), so a window ending at the fence index excludes it, and a regex demanding
        a trailing newline silently misses a key that happens to be the last frontmatter line;
        the fix is the +1 window (`strings.Index(raw[3:], "\n---") + 3 + 1`, safe after
        `adr.ParseDir` proved the fence exists). Second, a scan not bounded to the window at all
        matched a column-0 `related:` line in an ADR *body* (a quoted frontmatter example) and
        would have silently body-edited the target where the loud no-line failure was owed; the
        implementation review caught it. When touching frontmatter by regex, compute the window
        once and bound every scan to it - both edges carry regression tests in
        `internal/migrate/retirementtokens_test.go`.
    - title: "Raw-byte offsets go stale the moment an earlier pass edits the file"
      domains: [config]
      related: [128]
      tags: [schema-migration, adr-parsing]
      body: |
        `ADR.DecisionStart`/`DecisionEnd` are byte offsets into the bytes that were *parsed*. A
        migration that rewrites the body in one pass and appends at `DecisionEnd` in a later pass
        is appending at an offset that no longer means what it did. The generation-12
        supersession-keys migration downgrades `supersedes:` to `refines:` (three bytes shorter
        per token) before appending its bookkeeping item, and on a token-dense ADR the append
        landed far enough early to open inside the following heading, corrupting
        `## Invariants` into `## Inv13. **Supersedence bookkeeping...` - which then silently
        deleted every slug that ADR declared, surfacing as unrelated `adr-token-ref` drift.
        Track a per-file delta from every editing pass and add it to any later offset use, the
        way the same migration already tracked `removed` for stripped key lines. The tell is
        drift about *declarations going missing*, which points at a mangled section heading
        rather than at the tokens the error names.
    - title: "A scripted sweep over ADR prose can silently unmake the structure it edits"
      domains: [adr-system]
      related: [135]
      tags: [adr-parsing]
      body: |
        Editing ADR bodies across the corpus by script (the project-atomic cutover rewrote every
        legacy ADR into the v1 format this way) has failure modes that produce a file which still
        reads correctly to a human.

        A code span must be atomic. Wrapping a paragraph inside one splits an inline-code span
        (a qualified claim id, a `State changes` operation) across a newline, and the regexes do
        not match across newlines, so the parser goes blind to a construct a reader plainly sees.

        A Decision item's boundary must survive. An item span ends exactly where the next Decision
        item begins, so dropping a trailing newline concatenates the last line onto the next item's
        `N.` lead and MERGES TWO ITEMS, renumbering every item after them. That one is caught:
        `validateDecisionItems` requires items to run sequentially from 1, so the merge leaves a gap
        and reds `awf check`.

        Verify a sweep by its effect on structure, not by reading its diff. Two commands settle it:
        compare each ADR's Decision item list before and after (identical), and compare the
        whitespace-normalised prose from BOTH sides (identical). A one-sided strip reports every
        pre-existing construct as a change and buries the real finding in false positives.
    - title: "Within an Applied batch phase, claim mutations land before `awf sync`"
      domains: [adr-system]
      tags: [adr-lifecycle, invariant-backing, provenance-markers]
      body: |
        `awf sync` scans current-state markers and hard-refuses a proof marker naming a claim
        that does not exist yet. In an incremental batch phase everything commits as one staged
        transaction, but the working tree still has an order: the ADR-0151 phase-1 implementation
        wrote the marked render tests first and `./x sync` refused with "unknown claim ID" until
        the topic-part claim mutations were applied. Within each batch phase, edit the claims and
        the ADR status history, then sync, then run the tests; the commit boundary is unchanged.
    - title: "A plan must not pre-compute check-named lifecycle values"
      domains: [adr-system]
      tags: [plan-artifact, adr-lifecycle, verification-discipline]
      body: |
        `state-sequence` is a repository-global contiguous namespace and the frozen content
        digest is computed over the ADR body; both are named exactly by `awf check --staged` on
        mismatch, and a concurrently Implementing ADR may interleave batches at any time. The
        ADR-0151 plan initially wrote literal `state-sequence: 1` and `2` while the repository
        stood at 27; plan review caught it before implementation. A plan writes the event shape
        and the instruction "use exactly the value the staged check names", never a number or a
        digest, the same way it already avoids hard-coded counts.
    - title: "A pinned template contract string is usually pinned in more than one test"
      domains: [rendering]
      tags: [pinned-set-tests, render-completeness]
      body: |
        Render-contract tests pin exact template strings, and the same string is often pinned by
        several tests with different names: the ADR-0151 `resolveChildModel` signature change was
        swept through the two obvious model tests, passed them, and still failed the gate on
        `TestPiStructuredExplorationContract`, which pinned the old `executionMetadata` call
        shape for its own lens. Before refactoring a pinned string, grep the exact old text
        across all of `internal/`, not just the tests whose names match the feature, and treat
        every hit as part of the sweep.
    - title: "Skill prose near a skill name must not use invocation verbs it does not mean"
      domains: [rendering]
      tags: [chain-handoffs, eval-suite, workflow-chain]
      body: |
        The evals chain checker classifies a rendered skill line as a handoff when it carries
        both a prefixed skill name and an invocation verb (invoke, call, dispatch, hands off,
        chains through). A guidance sentence appended to the executing-plans companion line used
        "the subagent-dispatch companion" and flipped the pinned non-handoff pair
        `executing-plans->subagent-driven-development` into an invocation line, failing
        `TestWorkflowChainHandoffs`. When extending prose on or near a line naming another
        skill, pick verbs outside the checker's list ("run a long plan through the
        subagent-per-task companion") or move the sentence to its own line away from the name.
    - title: "Record implementation deviations before the terminal artifact transaction"
      domains: [adr-system]
      tags: [plan-artifact, adr-lifecycle, retrospective]
      body: |
        A plan's Notes section is the last honest place to record an implementation deviation, but
        it becomes frozen history when the plan moves to Implemented. The topic-authority hardening
        effort added `LegacyBaseline` to an exact planned API after user approval and correctly
        implemented it, yet omitted the deviation from Notes before the terminal plan and ADR
        transaction. Terminal review caught the documentary gap only after the plan had frozen, when
        editing Notes or rewriting commits would have violated immutable-history rules. Before staging
        the final status transition, compare the implemented public shapes and named deviations against
        the plan one last time, update Notes while the plan is still active, then freeze it. If review
        finds an omission afterward, preserve history and record the miss in the retrospective rather
        than making the completed plan falsely look prescient.
