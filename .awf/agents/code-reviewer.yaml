data:
    # focusItems replaces the catalog defaults wholesale (see pitfalls); the
    # first two entries are the catalog defaults, kept deliberately.
    focusItems:
        - name: plan-adherence
          description: the diff matches the plan's stated file paths and content; unexplained drift is a finding
        - name: test-coverage
          description: behaviour changes carry tests in the same commit; no assertion is weakened to pass
        - name: two-sided-set-checks
          description: when code compares two collections (lock vs rendered set, catalog pool vs on-disk files, declared vs on-disk parts), verify both directions are walked; one-sided iteration caused three independent check blind spots in the 2026-07-07 audit batch
        - name: part-placeholder-escaping
          description: 'a convention part that quotes a `\\{{=awf:key}}` token as documentation must backslash-escape it; an unescaped consumable token is silently substituted into the published output (the value where the token name belongs) with `awf check` clean, so only reading the rendered file catches it. Bit the ADR-0086 docs commit (rendering current-state part); the intent is ambiguous to a machine (substituting inside backticks is also legitimate), so this stays a judgment check: quoted-as-syntax means escaped, meant-to-resolve means bare'
        - name: coverage-ignore-reachability
          description: 'a new or retained coverage exclusion (`coverage-ignore`, `c8 ignore`, or equivalent) states a reachability claim; try to refute it by staging the state it declares impossible (e.g. the file combination or call order it rules out) before accepting it. A comment saying the branch is tested is not a justification for excluding it: remove the exclusion and confirm the coverage report proves that claim. Treat an ignore *inherited through a refactor* (call sites merged, signature changed, callers widened) as unproven by default, since the claim was written against the old shape. Three false Go claims surfaced on 2026-07-08 (stampLockSchema, the sectionDefault call site, gate''s "TOCTOU-only") and four more on 2026-07-09 (the singleton-standard-docs relocate cluster, all carried through a refactor), each hiding a reachable branch. The Pi dashboard review repeated the pattern with broad `c8 ignore` blocks over lifecycle code whose comments claimed exhaustive tests; the exclusions themselves prevented coverage from substantiating that claim.'
        - name: repo-boundary-enumeration
          description: 'code or tests that enumerate or open the repo tree must define their repository boundary: a filesystem walk prunes nested checkouts (a subdirectory with its own `.git` entry, directory or gitdir-pointer file) and takes a deliberate stance on hidden dirs; a repo open resolves the gitfile layout. The Go toolchain is immune (dot-dirs and nested modules invisible to `./...`), hand-rolled walkers are not; three independent instances on 2026-07-10 (audit gitfile open, config_test legacy-ref sweep into .claude/worktrees/, invariants scanner backed by nested-checkout markers). Git-history-based enumeration is immune by construction. A fourth instance landed 2026-07-18 (the ADR-0127 range-parser scan) despite this item, so the boundary is now stated once in `testsupport.WalkRepoSources`: a new repo-wide walk uses that helper rather than hand-rolling the prune'
        - name: invariant-proof-exercises-its-claim
          description: 'ENUMERATE every invariant claim the diff adds or changes and check each one separately; do not spot-check. An `invariant: <domain>/<topic>:<slug>` proof marker must exercise the whole claim it backs, not one instance of it: try mutating each clause the claim asserts and confirm the test fails. A marker that cannot fail is worse than none - it reads as backing while checking nothing, and it holds a green gate over a wrong implementation. Two markers in the ADR-0127 session were nominal (`audit-empty-range-clean`, `audit-reports-evaluated-scope`). This item did not prevent a third and much larger recurrence: the ADR-0128/0129/0130 session shipped roughly nine of twenty new slugs partially backed, two of them (`supersession-model-derives-state`, `supersession-model-single-source`) not merely untested but actively contradicted by the shipped code on Implemented ADRs, and one (`supersession-contested-anchor-advisory`) hiding a real defect that printed a wrong advisory on every commit of the implementation. In that session the first review pass missed them all and only an explicit enumeration in the verify pass found them, which is why this item now demands enumeration rather than judgment. A PRE-EXISTING marker falls outside that enumeration and can stay nominal indefinitely, since a review only revisits what the diff touches: on 2026-07-19 `TestCheckTokenRetirementIgnoresItemTokens` read as proof that a non-retirement token does not retire a slug, but passed only because item tokens carry an empty `Slug` and were excluded by an unrelated guard, so it never exercised the relation filter it appeared to prove. That masked a missing filter which let an inert `cites-invariant:` citation silently drop a live invariant''s backing, green gate and no drift. So when a diff RELIES on an existing test as evidence that a property is already covered, break the property and confirm that test fails before accepting the claim. A sharper trigger surfaced on 2026-07-19, in a diff whose author wrote the test AND the implementation in one sitting: when an implementation is SHAPED a particular way to prevent a specific regression, the test must fail when that shape is undone. `adr-related-ascending` declared three clauses and its test exercised one, so both mutations of the deliberate design passed it - deleting the loop-terminating `break`, and merging the ordering scan back into the resolution loop so a descent aborts the dangling-link scan, which is the precise failure the split-loop structure exists to prevent. The code comment explained the design and the test did not pin it. Read every "I did X so that Y cannot happen" comment in the diff as a test obligation, and undo X to confirm the suite goes red'
        - name: commit-contents-match-message
          description: 'for EACH commit in the range, check that what the message claims is actually in the diff: `git show --stat <sha>` against the subject and body, not the cumulative range diff, which hides a per-commit mismatch by summing it away. A message naming a file, an ADR, or an artifact it does not touch is the signal. This is not pedantry about wording - it catches an edit lost between the gate run and the commit, which a shared checkout makes easy: a concurrent session can revert an uncommitted file, and `git add -A` then commits a subset while the message describes the whole. On 2026-07-19 commit `7d327c7c` said it narrowed ADR-0131 s code-span declaration and reopened the ADR; `docs/decisions/0131-*.md` was not in the commit at all. Only the test half landed, so a proof marker was left asserting the opposite of the invariant sentence it was marked as proving - strictly worse than the defect being fixed, and invisible to the gate because prose is not checked and the tree was green either way. The same commit swept in 206 lines of another session s in-progress ADR. Also flag the inverse: a file in the diff that no part of the message accounts for.'
        - name: readiness-predicate-over-proposed-tree
          description: 'a bridge/migration predicate that GATES on state the same run also NORMALIZES must evaluate the proposed post-normalization result, not raw HEAD or the pre-normalization tree, or it deadlocks: read-only `upgrade --check` cannot pre-write what only attestation-time normalization produces. On 2026-07-20 (Plan 2 Phases 1-2) readiness rejected a legacy invariant retired by an effective token because its encoded `## Migration history` ledger line was absent, though `PlanNormalization` plans to append that exact line - attestation needs readiness, but readiness demanded the artifact only attestation writes. The fixtures pre-wrote the ledger and masked it, which is the second half of the trap: a fixture that bakes in the tool''s OWN planned mutation cannot exercise the from-scratch path, so a real corpus (tokens present, ledger not yet written) hits a deadlock no green test saw. When reviewing Plan 3/4 proposed-tree work, confirm each gating predicate reads the post-normalization projection and at least one fixture omits the planned mutation the tool is supposed to generate'
        - name: migration-executed-not-read
          description: 'a migration that rewrites authored files (anything under the decisions dir, or config the adopter wrote) must be RUN against the real corpus before review concludes, not reasoned about from the diff. Reading cannot see what running shows: the generation-12 supersession-keys migration shipped three defects past code review that a single real run surfaced instantly - a slug anchor emitted with the item key so the token was inert, a stale `DecisionEnd` offset that appended into the following heading and silently deleted every slug an ADR declared (surfacing far away as unrelated token-ref drift), and a block-style list whose key line was stripped leaving orphan entries, producing invalid YAML and a corpus that no longer parsed. Check equally that the migrated corpus is CHECK-CLEAN, not merely that the expected strings appear: asserting token substrings is what let a chained-supersession defect through'
    correctnessTraps:
        - description: error returns must wrap with %w to preserve the error chain
        - description: nil map/pointer dereferences; check before indexing or method calls
        - description: missingkey=zero renders a no-value token for missing interface{} entries. Keep vars complete; awf check catches this post-sync
        - description: template FuncMap functions must handle empty-string vars gracefully
    docCurrencyItems:
        - check: docs/decisions/INDEX.md regenerated by ./x sync when ADR frontmatter changes
        - check: AGENTS.md reflects workflow/convention changes
        - check: new project jargon introduced by the change carries a docs/glossary.md entry in the same change (recurred ADR-0067, ADR-0069, ADR-0082)
