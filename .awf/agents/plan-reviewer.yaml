data:
    focusItems:
        - name: step-exactness
          description: every task names exact file paths, relevant symbols, exact commands with terminal states, and supplies either exact content/diffs or implementation-ready pseudocode covering behavior, branches, ordering, failures, constraints, forbidden behavior, tests, acceptance assertions, and deterministic verification with no hidden design choice; exact form remains mandatory for machine-consumed declarative content, contract-bearing declarations, fixtures, golden output, commands, mechanical replacements, required literal prose, and the specialized batch task's representative and edge transformations; the batch task retains its affected-site set and post-check, and TBD, implement later, outcome-only summaries, hidden design choices remain placeholders rather than pseudocode, and the task must remain executable with no prior conversation context
        - name: quoted-command-output-is-rerun
          description: 'a plan that quotes a command and its expected output states a checkable fact: RUN it rather than reasoning about it, and never write a corrected number you have not observed. A review of the ADR-0128 plan "corrected" a `grep -rn adr.ParseDir(` count from 10 to 12 on the theory that two `coverage-ignore` comments matched; they read `adr.ParseDir here`, with no opening paren, so the pattern never matched them and BOTH the before and after numbers shipped wrong. An unverified correction makes a plan less accurate than leaving it alone, because the executor now trusts it. Escalate rather than correct when a plan asserts a literal COUNT at all: prefer a terminal-state assertion (the finding count reaches zero, the grep returns nothing, the drift check is clean), because a count is a measurement of a corpus that moves and a stale one fails misleadingly rather than loudly. The 2026-07-19 retrofit-D plan showed the compound form: its headline total was a merge-base measurement, its item/slug split was wrong at every commit, its sibling plan carried a third figure, and because four later figures were derived from the total, one stale measurement made every phase unverifiable. Correcting such numbers one at a time treats the symptom; the fix is to delete them in favour of the command'
        - name: claimed-enforcement-exists
          description: 'a plan step that justifies an instruction by naming a mechanism that will CATCH the mistake ("reds the gate", "the check refuses it", "drift surfaces it") asserts the mechanism exists: locate it in the source before accepting the step, exactly as the sibling item demands a quoted command be rerun. A phantom mechanism is worse than no claim, because it converts a step the executor must perform carefully into one they believe is backstopped, and it fails silently and only later. The 2026-07-19 retrofit-D plan told its executor twice that an out-of-order `related:` array "reds the gate" and a commit message repeated it; nothing enforced array order, and two ADRs had been out of order for months with `awf check` clean throughout. The three mid-array inserts that plan performed were correct only because a separate instruction told the executor to read each array first. When the claim is worth making, the honest resolutions are to build the mechanism (ADR-0131 Decision 10 did, so the claim is now true) or to restate the step as an instruction the executor must follow unaided'
        - name: phase-boundary-is-gateable
          description: 'each phase must be able to pass the gate ALONE, which is stronger than dependency order. Two shapes break it silently: a phase that removes or changes an invariant claim while the ADR declaring the `remove`/`update` operation stays Proposed (the claim mutation is checked only in the ADR''s Implemented transaction, so a claim edited a phase early is owed-but-mismatched), and a phase that introduces a function before the phase that first calls it (the dead-code gate refuses it). The ADR-0128 plan hit both - Phases 6 and 7 had to merge, and three model methods were written, deleted, and re-added a phase later. Place the claim mutation and the ADR status flip in the same phase, and a model method in the phase that consumes it'
        - name: dependency-order
          description: tasks are ordered so each builds only on already-completed work
        - name: gate-clean-embedded
          description: >-
              plan-embedded Go, commit subjects, and rendered-doc snippets already satisfy the
              gate the executor will run; commit subjects ≤72 chars (commit-gate), constant-string
              `fmt.Errorf`→`errors.New` and number `fmt.Sprintf`→`strconv` (perfsprint), gofmt-aligned
              literals, and no literal `{{...}}` tokens in agent-guide-rendered prose (the renderGuide
              brace guard)
        - name: section-taxonomy
          description: >-
              the plan follows the canonical shape, a `# Plan:` H1 title, the `date`/`adrs`/`status`
              frontmatter, the three header sections (Goal, Architecture summary, File
              structure), the phases, and the optional Verification/Notes tails, rather than
              re-improvising header field names or presentation
        - name: coupled-phase-escape
          description: >-
              a multi-phase change sharing one closing commit is marked as a coupled-phase group with
              the concrete reason it cannot be sliced into independently-gate-passing phases; the
              sanctioned exception, never used as a convenience to batch unrelated work
        - name: lifecycle-freeze
          description: >-
              the plan's two-state `status:` lifecycle is honoured; mutable while `Proposed`, flipped
              to `Implemented` in the final commit that freezes it, with implementation findings
              recorded in the Notes section alongside the freeze
        - name: invariant-claim-transition-phase-order
          description: >-
              when a plan removes or replaces an invariant claim, the proof marker moves in the same
              commit that flips the declaring ADR to `Implemented`; a pre-flip phase keeps the existing
              claim and its marker valid, because the claim mutation is checked only in that Implemented
              transaction, never while the ADR remains `Proposed`
    docCurrencyItems:
        - check: docs/decisions/INDEX.md task included whenever an ADR status flip is planned
        - check: AGENTS.md update task included when the plan introduces new conventions or changes the workflow chain
