data:
    # docCurrencyItems replaces the catalog defaults wholesale (see pitfalls):
    # this project's ADR-to-topic obligations under the current-state authority
    # model (ADR-0133, ADR-0135), not the generic decision-index reminder.
    docCurrencyItems:
        - check: docs/decisions/INDEX.md regenerated by ./x sync when any ADR status changes
        - check: AGENTS.md updated when the workflow chain or conventions change
        - check: "every claim named in this ADR's `## State changes` is authored to match in the same Implemented commit: an `add` claim appears with this ADR as `Origin`, an `update` claim appends this ADR to `Revised-by` and changes a canonical field, and a `remove` claim is gone (ADR-0135 items 8 and 9)"
        - check: "each State changes operation's destination topic metadata exists before the ADR reaches Accepted, an empty topic shell for a pending add (ADR-0135 item 5)"
        - check: "an `update` preserves the claim's `Origin` and the exact prior `Revised-by` prefix and changes a canonical field other than formatting or provenance; a rename is `remove` plus `add`; a removed id is never reused"
        - check: "RATIONALE QUALITY at each operation - the reviewer's job alone, since awf check proves only that the operation is structurally valid, not that it is warranted. The Decision item behind each add/update/remove must actually explain why that specific claim is created, changed, or retired (ADR-0135)."
    focusItems:
        - description: ADRs that change the config-tree schema or the lock format must enumerate all consumers (config, render, manifest, migrate) and confirm backward compatibility or a migration path.
          name: Schema stability
        - description: ADRs touching templates must confirm the missingkey=zero constraint is preserved; no template may render a no-value token when vars are empty strings.
          name: Template invariants
