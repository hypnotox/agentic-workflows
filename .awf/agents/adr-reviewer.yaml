data:
    # docCurrencyItems replaces the catalog defaults wholesale (see pitfalls); the
    # back-pointer entry is a catalog default, restated here deliberately (ADR-0116).
    docCurrencyItems:
        - check: docs/decisions/ACTIVE.md regenerated by ./x sync when any ADR status changes
        - check: AGENTS.md updated when workflow chain or conventions change
        - check: docs/decisions/README.md index row added or updated for the ADR
        - check: when this ADR claims an anchor (Decision item or invariant slug) of another ADR of ANY status, that ADR's `related:` names this ADR in the same commit
        - check: "every claimed anchor carries its token in this ADR's Decision section, one per anchor: `supersedes: ADR-NNNN#<item>` or `supersedes-invariant: ADR-NNNN#<slug>` to retire, `refines: ADR-NNNN#<item>` to adapt (ADR-0128)"
        - check: "each token uses the RIGHT relation, and the choice is THREE-way, not two: `supersedes:` asserts the anchor is replaced and counts toward retiring the target outright, `refines:` asserts it is adapted and counts toward nothing, and `cites:` asserts NOTHING about the anchor and exists only to record an informational reference (ADR-0131 item 4). A refinement mislabelled as a retirement can silently kill a live ADR; a retirement mislabelled as a refinement leaves a dead decision reading as current; and a citation mislabelled as a refinement records an adaptation that never happened. Judge by reading the TARGET's clause set, never the carrier's verb, and note the error runs in BOTH directions: an adjudication that a token asserts too much is as wrong as one asserting too little. On 2026-07-19 a retrofit plan scheduled `refines: ADR-0083#4` for ADR-0121 item 2, whose own prose says the target contract is \"preserved in effect, not overridden\" and that \"no override token is owed\", and every clause of the target survived; `cites:` was correct. A carrier that explicitly DENIES overriding its target still owes a token, because the citation check is armed by the verb, but the token it owes is the inert one."
        - check: "RATIONALE QUALITY at each claim site - the reviewer's job alone, since awf check proves only that a rationale site exists. The Decision item carrying each token must actually explain why that specific anchor is superseded or refined, not merely assert that it is (ADR-0128 item 9)."
    focusItems:
        - description: ADRs that change the config-tree schema or the lock format must enumerate all consumers (config, render, manifest, migrate) and confirm backward compatibility or a migration path.
          name: Schema stability
        - description: ADRs touching templates must confirm the missingkey=zero constraint is preserved; no template may render a no-value token when vars are empty strings.
          name: Template invariants
