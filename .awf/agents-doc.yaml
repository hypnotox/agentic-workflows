data:
    commands:
        - cmd: go test ./...
          desc: run the test suite
        - cmd: ./x gate
          desc: run the gate before committing
        - cmd: ./x check
          desc: check rendered files for drift (also enforces the schema-version gate)
        - cmd: awf upgrade
          desc: migrate the config tree to the current schema after upgrading awf
        - cmd: awf audit
          desc: report workflow-conformance findings over the branch's commits (advisory)
        - cmd: awf new plan "<Title>"
          desc: scaffold a dated plan under docs/plans from the rendered plans template
    invariants:
        - ref: ADR-0001, ADR-0045
          text: '**Publication-safe templates.** Every interpolation degrades to coherent generic prose when its var/data is unset; no unresolved-value token ever renders.'
        - text: '**`awf check` is the drift oracle.** After any `.awf/` edit run `./x sync && ./x check`; commit rendered files with their config and never hand-edit one.'
        # Typed marker (ADR-0055), not a hand-written ref/text entry: the template's
        # `kind == "scopes"` branch renders the Conventional-Commits / commit-scope
        # invariant from audit.allowedScopes so a scopes edit updates the guide.
        - kind: scopes
        - ref: ADR-0006
          text: '**Valid skill/agent frontmatter.** Rendered skills and agents carry parseable frontmatter with non-empty `name`/`description`.'
        - ref: ADR-0008
          text: '**Backed invariants.** Every Implemented-ADR invariant is declared in one of two forms and symmetrically enforced: a backed `` `invariant: <slug>` `` requires a matching proof `<marker> invariant: <slug>` comment on a test — scoped to `invariants.testGlobs` when set, else any `invariants.sources` file (source-only fallback) — while an `` `unbacked-invariant: <slug>` `` is a reasoned contract that must carry a `Verify:` note and must NOT have a proof marker. A `touches-invariant: <slug>` marker is advisory context, never backing. Retirement by an Implemented successor ADR drops a slug (ADR-0031).'
        - ref: ADR-0046
          text: '**No dead skill references.** `awf check` fails on a rendered reference to a catalog skill outside the effective enabled set.'
        - ref: ADR-0012
          text: '**100% coverage gate.** `./x gate` fails below 100% statement coverage; exclude a genuinely-unreachable branch only with `// coverage-ignore: <reason>`.'
        - ref: ADR-0063
          text: '**Dead-code gate.** `./x gate` runs `deadcode` (no `-test`) over `./...` and fails on any production function unreachable from a `main` outside `internal/testsupport/`; `cmd/deadcodecheck` enforces this with no `//deadcode:ignore` escape hatch.'
        - ref: ADR-0066, ADR-0071
          text: '**Advisory mutation triage.** `./x mutants` runs `gremlins` under the deterministic `.gremlins.yaml` config and is never part of `./x gate`; `cmd/mutants` exits non-zero when any mutant times out (the run is untrustworthy) and otherwise reports only survived (`LIVED`) mutants, treating an empty report as no survivors and a missing report path as an error.'
        - ref: ADR-0020
          text: '**No dead internal links.** `awf check` fails on any inline markdown link in an awf-managed rendered doc whose file-relative target is missing on disk.'
        # `kind == "gated-commands"` renders the list from clispec via the
        # $.gatedCommands render key, so it cannot drift from the code (ADR-0094).
        - kind: gated-commands
          ref: ADR-0039
        - ref: ADR-0040
          text: '**Self-pinning bootstrap.** The rendered `.awf/bootstrap.sh` defaults its fetch to exactly the rendering binary''s `project.Version`; a pre-set `AWF_VERSION` environment value overrides the target release, verification unchanged.'
        - ref: ADR-0040
          text: '**Bootstrap checksum.** The rendered bootstrap verifies the download SHA-256 before installing.'
        - ref: ADR-0048
          text: '**Inert hook payloads.** With the `hooks` singleton enabled, exactly three payload scripts render under `.awf/hooks/`; awf never activates hooks or touches git config — the `.githooks/` stubs are this repo''s own wiring.'
        - ref: ADR-0049
          text: '**Single version authority.** `awfVersion()` returns `project.Version`; no ldflags var or build info feeds gating, stamping, or pinning, and a schema-generation bump requires a matching `minVersionBySchema` entry and version bump.'
        - ref: ADR-0049
          text: '**Bootstrap output contract.** The rendered bootstrap prints exactly one stdout line (the resolved binary path), resolves an exactly-matching PATH `awf` before downloading, and verifies checksums via `sha256sum` or `shasum -a 256`; the contract is `bootstrap.sh`''s alone — the upgrade porcelain''s stdout belongs to the exec''d `awf upgrade`.'
        - ref: ADR-0050
          text: '**Reviewing-skill/agent pairing.** A reviewing skill enabled without its dispatched agent fails every gated command; `awf disable agent` refuses upfront and `awf enable skill` auto-enables the pair.'
        - ref: ADR-0051
          text: '**Single commit-scope storage.** Commit scopes live only in `audit.allowedScopes` — no `commitScope` var, no hand-written scope prose in templates; templates quote the `commitScopes` render key, and a scopes edit reflags referencing artifacts in `awf check`.'
        - ref: ADR-0055
          text: '**Config-derived guide scopes.** The agent guide''s commit-scope mention renders from `audit.allowedScopes` via the `commitScopes` render key — never a hand-written token list — and degrades to generic Conventional-Commits prose when scopes are accept-any; awf''s five code scopes mirror the `domains:` list by hand-maintained convention.'
        - ref: ADR-0053
          text: '**Full-catalog eval coverage.** The golden-task eval suite (`internal/evals`) renders every catalog skill and agent via a full `Project.SyncReport` and asserts cross-artifact workflow seams; its fixture enabled-set is derived from `catalog.Standard` so it cannot silently stop covering a new chain artifact.'
        - ref: ADR-0054
          text: '**Uniform machine-enforced chain handoffs.** Every catalog skill/agent template''s `awf:section` markers match its catalog-declared sections (`skill-section-parity`), so a section rename cannot half-land with a blank override path; and the `internal/evals` suite asserts each forward handoff names its successor on an invocation-verb line and that the ten-node chain graph is connected (no orphan, all reachable from `brainstorming`).'
        - ref: ADR-0060, ADR-0061
          text: '**Unified compile-time doc model.** The catalog is a compile-time Go value (`catalog.Standard`, no embedded YAML), and every doc — toggleable or always-on singleton — is one `DocEntry` from which every projection (`SingletonKinds`, `plainSingletons`, the `.layout` paths, the toggleable pool) derives; adding a mandatory doc is a single entry. Config-tree render units — the bootstrap, the hook payloads, the working-memory `.gitignore` (ADR-0069), and the command-runner `x` (ADR-0101) — are deliberately outside the doc collection: dedicated render blocks, no `DocEntry`.'
        - ref: ADR-0069
          text: '**Ephemeral working memory.** `awf sync` always renders the self-ignoring `.awf/memory/.gitignore`; working-memory files are session state — never committed, never cited by an ADR, plan, or commit message, deleted when the chain terminates.'
        - ref: ADR-0070
          text: '**Stub advisory, residual-marker guard.** Unauthored stub content — a stub-attributed section at its template default, or a part carrying the whole-line `awf:stub` marker — is a non-failing `awf check`/`awf init` note keyed by output path, never a failure; a marker-shaped `awf:section`/`awf:end` token surviving section assembly into the skeleton is a hard render error — scoped to awf-owned template source; adopter parts and data are deliberately outside it (their whole-line residue is ADR-0083''s advisory) — and every shipped template section default is deliberately classified: authoring prompts carry `stub`, shippable prose stays plain.'
        - ref: ADR-0076
          text: '**Atomic trust-bearing writes.** `.awf/awf.lock` and migration rewrites of existing config files go through the temp-file-plus-rename helper (`manifest.WriteFileAtomic`); no truncate-in-place write of a trust-bearing file remains.'
        - ref: ADR-0076
          text: '**Corrupt lock refuses.** A present-but-unreadable `.awf/awf.lock` is a hard error in every lock reader, with one recovery hint (restore from version control, or delete deliberately to re-adopt); sync refuses before writing anything, so a corrupt lock can never create a backup, skip a prune, or be overwritten. A missing lock keeps each caller''s no-lock semantics.'
        - ref: ADR-0077
          text: '**One anchored glob dialect.** Every glob — `invariants.sources[].globs`, `audit.dependencyManifests`, domain `paths` — is an anchored full-path doublestar match against the slash-separated repo-relative path (`internal/pathglob`): `*.go` is top-level only, any-depth is `**/*.go`, and no production matcher matches a basename. The schema-7 migration rewrites legacy no-slash patterns to `**/<pattern>`, idempotently and atomically.'
        - ref: ADR-0077
          text: '**Domain-code-staleness is advisory and part-keyed.** The `domain-code-staleness` audit rule emits one branch-level Warning per configured domain whose sidecar-declared `paths` territory changed in range without a co-change to `.awf/domains/parts/<X>/current-state.md` — keyed on the source part, never the rendered doc, with generated paths excluded; inert for a domain without `paths`, disable-able via `audit.domainCodeStaleness`, and never changes the audit exit code.'
        - ref: ADR-0078
          text: '**Release-time changelog pin.** The every-commit gate holds only changelog ordering — entries strictly descending by semver, the newest at or below `project.Version` — so a mid-cycle version bump never touches the changelog; the exact match is `cmd/releasecheck`''s: run by the Release workflow before GoReleaser (a gate test asserts the wiring) and as the runbook''s pre-tag rehearsal, it refuses a release whose newest changelog entry is not exactly `project.Version` or whose standing `[Unreleased]` section is missing or non-empty.'
        - ref: ADR-0079
          text: '**SHA-pinned workflows.** Every remote `uses:` reference under `.github/workflows/` pins a full 40-hex commit SHA (repo-local `./` refs exempt, `docker://` refs digest-pinned) and every goreleaser-action `version:` input is an exact semver version — `cmd/pincheck`, run by `./x gate`, fails otherwise, and weekly dependabot (actions + gomod) keeps the pins current.'
        - ref: ADR-0079
          text: '**Gated, integrity-only release.** `release.yml` refuses a tag whose commit is not on `origin/main` and runs `./x gate` and `./x check` before GoReleaser (a gate test asserts the wiring); Codecov uploads skip without `CODECOV_TOKEN` — coverage enforcement is the local gate; checksum verification is integrity-only, publisher compromise being a documented, deliberately-accepted risk.'
        - ref: ADR-0080
          text: '**Catalog-derived template sweep.** Every catalog skill/agent template renders under empty data in a catalog-derived loop banning leak residue and skill references outside the artifact''s `requiresSkills` declaration; the artifact set derives from the catalog, never a hand list.'
        - ref: ADR-0080
          text: '**Exact coupling declarations.** `requiresSkills` declarations are exact: an undeclared unconditional skill reference and a stale declaration both fail the sweep, and every other exemption is an explicit entry that fails when stale.'
        - ref: ADR-0080
          text: '**Conditional-fallback case guard.** Every catalog template whose post-expansion source carries a conditional action has a hand-authored unset-data case pinning its degraded prose.'
        - ref: ADR-0080
          text: '**Golden-test completeness.** Every catalog skill and agent has its per-artifact golden test in `internal/project`.'
        - ref: ADR-0081
          text: '**Enabled set closed.** Every enabled, non-`local` artifact''s direct catalog requirements (`requiresSkills`, `requiresAgent`, `requiresDoc`) are enabled; a violation fails every gated command at project open with a repair hint.'
        - ref: ADR-0081
          text: '**Enable applies the closure plan.** `awf enable` enables the requested artifact''s full missing forward closure in a single config rewrite, printing one provenance line per plan op; `--dry-run` prints without applying.'
        - ref: ADR-0081
          text: '**Disable refuses dependents.** Without `--with-dependents`, `awf disable` refuses while enabled transitive dependents exist, printing the dependent plan; with it, the full reverse closure lands in a single rewrite.'
        - ref: ADR-0081
          text: '**Close-enabled-set migration.** The schema-8 migration closes the enabled set additively for skill, agent, and doc requirements, drops dormant non-`local` doc-gated skills, and is idempotent and atomic.'
        - ref: ADR-0081
          text: '**Init set closed.** `awf init`''s scaffolded enabled set — curated default or closure-completed trim (agents derived from the trimmed skills) — satisfies the closure invariant.'
        - ref: ADR-0082
          text: '**Template source residue banned.** Every file in the embedded templates FS is free of concrete `ADR-` citations (four-digit tokens; the `ADR-NNNN` placeholder is legal) and of repo-identity literals outside a pinned three-entry exemption list (bootstrap and upgrade-script download slugs, agent-guide home link) whose entries fail when stale; extending the list is a successor-ADR act.'
        - ref: ADR-0083
          text: '**Part-marker advisory.** A trimmed convention-part line beginning with a marker-shaped `awf:section`/`awf:end` comment opener, outside fenced code, yields a part-path-keyed note from `awf check` and `awf init` — never a failure; inline prose quoting the form mid-line and fenced whole-line examples stay silent.'
        - ref: ADR-0085
          text: '**Self-contained upgrade porcelain.** The `bootstrap` singleton renders exactly two files — the deterministic `.awf/bootstrap.sh` and the `.awf/upgrade.sh` porcelain, which resolves its target (`$1` or the newest release), fetches exclusively by invoking the bootstrap with `AWF_VERSION` set, and hands off with `exec "$binary" upgrade` as its final statement (the `exec` guards against the truncate-in-place self-rewrite); `awf upgrade` always ends in a sync, so even a zero-migration binary bump re-renders and re-pins.'
        - ref: ADR-0086
          text: '**Closed config tree.** Every `.awf/` entry outside the claimed-path model — enabled artifacts'' sidecars and declared-section parts, the rendered units, the skeleton — is failing `awf check` drift, collapsed to the topmost unclaimed directory (`memory/**` exempt; `*.awf-bak` backups flagged for review; a `local: true` artifact''s parts unclaimed), and authored-but-unconsumed configuration fails too: non-empty `vars:` keys and sidecar `data:` keys no rendered artifact references.'
        - ref: ADR-0086
          text: '**Inert sidecar fields refuse at open.** `paths:` on a non-domain sidecar and any non-`paths:` field on a domain sidecar (`data:`, `sections:`, `local: true`) fail every gated command at project open; interactive `awf init` prompts only for vars the scaffolded enabled set''s templates reference.'
        - ref: ADR-0087
          text: '**Deleting a var key acknowledges its note.** The unset-var advisory fires only for a `vars:` key present with an empty or null value; an absent key is the deliberate, git-auditable decline and never notes. A release adding a catalog var ships a one-time schema-migration seed, and `awf new` seeds its scaffold''s referenced vars, so absence stays a deletion signal. Rendering is unchanged — absent, null, and empty degrade identically.'
        - ref: ADR-0088
          text: '**Adopter config reference.** `internal/configspec` is the single adopter-facing description authority — every config key and sidecar field (reflection-parity-enforced), every template-referenced per-artifact data key (injected keys exempt), var entries derived verbatim from the catalog descriptors with configspec-owned availability clauses, descriptions residue-free (no ADR citations, no repo identity). `docs/config-reference.md` is an always-on generated index projecting it with live state — regeneration-checked, tables not part-overridable, its sidecar sections/local-only (`data:` refuses at open). `awf config [<key-or-var>]` serves the same model from the CLI, static outside an adopted tree.'
        - ref: ADR-0090
          text: '**Example adopter checked.** `./x sync` re-renders the committed example adopter `examples/sundial` with a source-built awf, and `./x check` fails on its drift or invariant findings.'
        - ref: ADR-0090
          text: '**Example zero-notes.** The example check step fails on any `note: ` line in the example''s `awf check` output — the model adopter has no smells.'
        - ref: ADR-0090
          text: '**Example module isolated.** `examples/sundial` is its own Go module; no enclosing `./...` sweep (test, coverage, vet, lint, deadcode) includes it.'
        - ref: ADR-0091
          text: '**Local-doc catalog clone.** `effectiveCatalog` synthesizes local doc entries into a clone of `catalog.Standard.Docs`; the package global''s `Docs` map is never mutated by opening a project (`invariant: local-doc-catalog-clone`).'
        - ref: ADR-0091
          text: '**Local-doc declaration + no-shadow.** A non-Standard, non-`local:true` enabled doc name without a declaring sidecar is a hard error at project open (`invariant: local-doc-requires-declaration`), and a local doc name equal to a `catalog.Standard.Docs` name is rejected (`invariant: local-doc-no-shadow`).'
        - ref: ADR-0091
          text: '**Local-doc render + map fields.** A rendered local doc resolves its template id through the effective catalog to the shared base doc template (`invariant: local-doc-renders-from-base`) and its synthesized entry always carries a non-empty Title/Desc — sidecar or default — so the document map lists it (`invariant: local-doc-map-fields`).'
        - ref: ADR-0091
          text: '**Local-doc base + name.** The base doc template renders leak-free under empty data and no `content` part (`invariant: local-doc-base-publication-safe`), and a local doc name is accepted only as one or more lowercase-kebab `/`-separated segments — rejecting a path escape, a leading/trailing/empty segment, a `.md` suffix, or the reserved `_base` stem; skill and agent names stay flat (`invariant: local-doc-name-path-validated`).'
        - ref: ADR-0092
          text: '**Context read-only.** `awf context <paths>` reports the owning domains, backed invariants, related ADRs, and each domain''s current-state pointer for the given repo-relative paths; the command entry point holds no writer dependency and never mutates config, the lock, or any file (`invariant: context-read-only`).'
        - ref: ADR-0092
          text: '**Context static fallback.** Outside an adopted tree (`ConfigPath` absent) `awf context` degrades to a static answer rather than refusing, mirroring the `config` command; the inside-tree version gate is the shared `gate()` marker, so this slug backs the fallback branch alone (`invariant: context-static-fallback`).'
        - ref: ADR-0092
          text: '**Context output parity.** The human and `--json` renderings of `awf context` report the same context set for the same inputs, because both derive from one assembled `ContextResult` (`invariant: context-output-parity`).'
        - ref: ADR-0098
          text: '**Plan frontmatter validated.** `awf check` fails a plan under `docs/plans/` whose `status:` is outside `{Proposed, Implemented}`, and a plan whose YAML frontmatter is unparseable is a hard check error; the grandfathered frontmatter-less corpus is skipped (`invariant: plan-frontmatter-validated`).'
        - ref: ADR-0098
          text: '**Plan→ADR links resolve.** `awf check` fails a plan whose `adrs:` names an ADR number with no matching file under `docs/decisions/` (`invariant: plan-adr-link-resolved`).'
        - ref: ADR-0111
          text: '**Planned commit subject checked.** `awf check` fails a plan whose ` ```commit ` fence first non-empty line is over the resolved `audit.SubjectMaxLength` or is malformed / a disallowed type; an unknown scope is a non-failing `note:` instead, since a plan may add the scope (`invariant: plan-commit-subject-length-checked`, `invariant: plan-commit-subject-shape-checked`, `invariant: plan-commit-subject-scope-advisory`).'
        - ref: ADR-0111
          text: '**Commit-fence marker scoped.** Only a fence whose info string''s first token is `commit` and which lacks the `awf-ignore` opt-out is read as a planned subject; bare fences, other info strings, empty blocks, and `template.md` are never validated (`invariant: plan-commit-subject-marker-scoped`, `invariant: plan-commit-subject-optout-honored`).'
        - ref: ADR-0097, ADR-0098, ADR-0108
          text: '**Plans-template taxonomy.** The `plans-template` singleton renders `docs/plans/template.md` with the canonical `date`/`adrs`/`status` frontmatter and the Goal/Architecture/File-structure header, phases, and Verification/Notes tails, marker- and leak-free (`invariant: plans-template-taxonomy`).'
        - ref: ADR-0098
          text: '**Plan scaffolding is unnumbered.** `awf new plan "<Title>"` scaffolds a date-prefixed `YYYY-MM-DD-slug.md` from the rendered plans template — no sequential number allocated — refusing to overwrite a same-day same-title plan (`invariant: plan-new-unnumbered`).'
        - ref: ADR-0099
          text: '**Pitfall data validated.** `awf check` fails on unparseable `.awf/docs/pitfalls.yaml` data, and on an entry with an empty/newline title or empty body; the render transform is a hard error on the same malformed data (`invariant: pitfall-data-validated`).'
        - ref: ADR-0099
          text: '**Pitfall domains resolve.** `awf check` fails a pitfall entry whose `domains:` names a domain not configured in the project; a domainless entry is valid and never surfaces via `awf context` (`invariant: pitfall-domains-resolved`).'
        - ref: ADR-0099
          text: '**Pitfall→ADR links resolve.** `awf check` fails a pitfall entry whose `related:` names an ADR number with no matching file under `docs/decisions/` (`invariant: pitfall-adr-link-resolved`).'
        - ref: ADR-0102
          text: '**Uncovered lists unowned, unignored, ungenerated.** In `--uncovered` mode `awf context` reports exactly the scanned git-tracked paths (under the given scan roots, or the whole tree) matched by no configured domain glob, not in the project''s rendered `PlannedOutputs` set, and matched by no `contextIgnore` glob — every uncovered path represented by one reported entry (itself or a reported ancestor directory), no domain-owned, generated, or ignored path represented; an absent/empty `contextIgnore` is inert (`invariant: uncovered-lists-unowned-unignored`).'
        - ref: ADR-0102
          text: '**Uncovered collapses directories.** A directory all of whose scanned tracked descendants are uncovered is reported as that topmost directory, never as its individual descendant files (`invariant: uncovered-collapses-directories`).'
        - ref: ADR-0102
          text: '**Uncovered output parity.** The human and `--json` renderings of `awf context --uncovered` report the same uncovered set, because both derive from one assembled `UncoveredResult` (`invariant: uncovered-output-parity`).'
        - ref: ADR-0103
          text: '**Governed tag vocabulary.** With a non-empty `tags:` vocabulary, `awf check` fails on any tag used by an ADR or a pitfall that is not a declared vocabulary member, and on any member with an empty meaning; an empty or absent vocabulary is inert, and a declared member no artifact uses is allowed (`invariant: tag-vocabulary-governed`).'
        - ref: ADR-0109
          text: '**Tag not domain name.** A tag is a sub-domain topic, finer than a domain: with a non-empty `tags:` vocabulary and a non-empty `domains:` set, `awf check` fails if any vocabulary member equals a configured domain name; an empty vocabulary or a project with no domains is inert (`invariant: tag-not-domain-name`).'
        - ref: ADR-0109
          text: '**Tag frequency note.** `awf check` emits a non-failing `note:` for each vocabulary tag carried by more than 25% of the tag-bearing artifacts (ADRs plus pitfalls) — advisory coarsening drift that never changes the exit code (`invariant: tag-frequency-note`).'
        - ref: ADR-0109
          text: '**Tag coverage note.** Under a non-empty vocabulary, `awf check` emits a non-failing `note:` for each ADR or pitfall carrying zero tags — the under-tagging backstop; an empty/absent vocabulary is inert and the note never changes the exit code (`invariant: tag-coverage-note`).'
        - ref: ADR-0103
          text: '**ADR related links resolve.** `awf check` fails an ADR whose `related:` names an ADR number with no matching file under `docs/decisions/`, independent of the tag vocabulary (`invariant: adr-related-link-resolved`).'
        - ref: ADR-0104, ADR-0106
          text: '**Context Tier 1 governs.** `awf context <paths>` reports as Tier-1 "governing" ADRs exactly the Implemented, non-retired ADRs declaring an invariant slug present under a queried path — presence deriving from the union scan of `invariants.sources` and `invariants.testGlobs`, recognising both the proof `invariant:` and the advisory `touches-invariant:` marker, intersected with the shared one-to-one `slug → declaring ADR` join; each governing invariant is labelled backed or unbacked (`invariant: context-tier1-marker-union`).'
        - ref: ADR-0104
          text: '**Context Tier 2 precise tag.** The Tier-1 precise set is the plain union of the Tier-1 ADRs'' tags (no domain-name filtering — the tag-not-domain-name gate forbids a tag naming a domain). A non-Tier-1, non-Superseded ADR is Tier 2 iff it shares a precise tag or is `related:`-linked from a Tier-1 ADR; a pitfall is Tier 2 iff it shares a precise tag; each artifact appears in at most one tier; an empty precise set yields a Tier 2 of only the Tier-1 ADRs'' `related:` links (`invariant: context-tier2-precise-tag`).'
        - ref: ADR-0104
          text: '**Context Tier 3 collapsed.** A domain-membership ADR in neither Tier 1 nor Tier 2 is reported only as part of a collapsed background count with the domain current-state pointers, never individually enumerated (`invariant: context-tier3-collapsed`).'
        - ref: ADR-0104
          text: '**Context surfaces tiered plans.** `awf context` surfaces a plan iff its `adrs:` links a Tier-1 or Tier-2 ADR, on the single `ContextResult` preserving read-only/parity/fallback (`invariant: context-surfaces-tiered-plans`).'
        - ref: ADR-0104
          text: '**Context surfaces tiered pitfalls.** `awf context` surfaces a pitfall iff it shares a tag with the Tier-1 precise set, on the single `ContextResult` preserving read-only/parity/fallback (`invariant: context-surfaces-tiered-pitfalls`).'
        - ref: ADR-0100
          text: '**In-place-editable sections.** A section declared with the `inplace` marker has its body read back from the existing rendered output — bounded by its `awf:edit-in-place` pointer and awf''s next registered section pointer (matched by that pointer''s expected string in the target''s comment syntax, never a generic pointer shape), leading/trailing framing trimmed, interior verbatim — and is preserved across syncs while awf regenerates every other section and the structure from the template; such a file is drift-checked by regeneration-with-read-back via a first-class `RegenChecked` attribute (which replaced the hardcoded generated-index path list). A section is part-overridable XOR in-place-editable. Off the one `#!`-shebang predicate (shared with `injectBanner`): the surviving `awf:edit`-family pointers render in the target''s comment syntax (`#`-line for a shebang script, HTML otherwise), and a rendered `#!` file is written executable (`0755`, enforced every sync). (`invariant: in-place-pointer-distinct`, `in-place-readback`, `in-place-tamper-drift`, `section-source-exclusive`, `in-place-spacing-owned`, `regeneration-checked-attribute`, `shebang-rendered-executable`)'
        - ref: ADR-0101
          text: '**Managed command runner.** With the `runner` singleton enabled, `awf sync` renders exactly one co-owned command-runner `x` at the repo root (disabled/absent renders none; awf-the-repo leaves it disabled). Its awf-verb arms (`sync check invariants audit context commit-gate new`) are awf-owned, outside any in-place section, each delegating directly to the bootstrap-resolved pinned binary; the setup/helpers and project-verb regions are `awf:edit-in-place` sections (ADR-0100). The runner is a dedicated render block, not a `catalog.Standard.Docs` entry, so it stays out of `SingletonKinds()`; the example adopts it drift-free, invariant-clean, zero-notes. (`invariant: runner-singleton-toggle`, `runner-awf-verbs-owned`, `runner-project-verbs-in-place`, `runner-render-publication-safe`, `runner-example-adopted`, `singleton-kinds-complete`)'
