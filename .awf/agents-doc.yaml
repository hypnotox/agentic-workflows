data:
    commands:
        - cmd: go test ./...
          desc: run the test suite
        - cmd: ./x gate
          desc: run the gate before committing
        - cmd: ./x check
          desc: check rendered files for drift (also enforces the schema-version gate)
        - cmd: awf upgrade
          desc: migrate the config tree to the current schema after upgrading awf
        - cmd: awf audit
          desc: report workflow-conformance findings over the branch's commits (advisory)
        - cmd: awf new plan "<Title>"
          desc: scaffold a dated plan under docs/plans from the rendered plans template
    # Core-only invariants (ADR-0112): the guide lists only cross-cutting rules
    # not scoped to a single subsystem's files. Path/subsystem-specific invariants
    # live in their owning ADR and are reached via `awf context` / ACTIVE.md;
    # do not re-add them here. Retention criterion: docs/agents-md-standard.md.
    invariants:
        - ref: ADR-0001, ADR-0045
          text: '**Publication-safe templates.** Every interpolation degrades to coherent generic prose when its var/data is unset; no unresolved-value token ever renders.'
        - text: '**`awf check` is the drift oracle.** After any `.awf/` edit run `./x sync && ./x check`; commit rendered files with their config and never hand-edit one.'
        # Typed marker (ADR-0055), not a hand-written ref/text entry: the template's
        # `kind == "scopes"` branch renders the Conventional-Commits / commit-scope
        # invariant from audit.allowedScopes so a scopes edit updates the guide.
        - kind: scopes
        - ref: ADR-0008
          text: '**Backed invariants.** Every Implemented-ADR invariant is declared in one of two forms and symmetrically enforced: a backed `` `invariant: <slug>` `` requires a matching proof `<marker> invariant: <slug>` comment on a test, scoped to `invariants.testGlobs` when set, else any `invariants.sources` file (source-only fallback), while an `` `unbacked-invariant: <slug>` `` is a reasoned contract that must carry a `Verify:` note and must NOT have a proof marker. A `touches-invariant: <slug>` marker is advisory context, never backing. A `supersedes-invariant:` token on an Implemented successor ADR retires a slug (ADR-0120).'
        - ref: ADR-0115, ADR-0119
          text: '**Plain punctuation, repo-wide.** No tracked text file carries a typographic punctuation substitute: not the embedded templates or changelog, not a string literal in production Go, and not a Go comment, a test, a sidecar, or the infrastructure scripts. Seven codepoints are banned (the em-dash U+2014, en-dash U+2013, ellipsis U+2026, and the curly quotes U+2018, U+2019, U+201C, U+201D); use plain ASCII punctuation, a bare hyphen included. Two layers enforce this: ADR-0115 gates the shipped surfaces unconditionally with no exemption list, and the opt-in `awf prose-gate` (ADR-0119, on in this repo, wired into `./x gate`) scans every tracked file, exempting only the handful of genuine depictions pinned in `proseGate.exemptions`. Notation (arrows, mathematical symbols, accented letters) stays legal. A doc that must show a banned glyph names it by codepoint or lands in the exemption list.'
        - ref: ADR-0012
          text: '**100% coverage gate.** `./x gate` fails below 100% statement coverage; exclude a genuinely-unreachable branch only with `// coverage-ignore: <reason>`.'
        - ref: ADR-0063
          text: '**Dead-code gate.** `./x gate` runs `deadcode` (no `-test`) over `./...` and fails on any production function unreachable from a `main` outside `internal/testsupport/`; `cmd/deadcodecheck` enforces this with no `//deadcode:ignore` escape hatch.'
        # `kind == "gated-commands"` renders the list from clispec via the
        # $.gatedCommands render key, so it cannot drift from the code (ADR-0094).
        - kind: gated-commands
          ref: ADR-0039
