data:
    docMap:
        - path: docs/releasing.md
          desc: how to cut a release (tag, GoReleaser binaries, versioning)
    commands:
        - cmd: go test ./...
          desc: run the test suite
        - cmd: ./x gate
          desc: run the gate before committing
        - cmd: ./x check
          desc: check rendered files for drift (also enforces the schema-version gate)
        - cmd: awf upgrade
          desc: migrate the config tree to the current schema after upgrading awf
        - cmd: awf audit
          desc: report workflow-conformance findings over the branch's commits (advisory)
    invariants:
        - ref: ADR-0001, ADR-0045
          text: '**Publication-safe templates.** Every interpolation degrades to coherent generic prose when its var/data is unset; no unresolved-value token ever renders.'
        - text: '**`awf check` is the drift oracle.** After any `.awf/` edit run `./x sync && ./x check`; commit rendered files with their config and never hand-edit one.'
        # Typed marker (ADR-0055), not a hand-written ref/text entry: the template's
        # `kind == "scopes"` branch renders the Conventional-Commits / commit-scope
        # invariant from audit.allowedScopes so a scopes edit updates the guide.
        - kind: scopes
        - ref: ADR-0006
          text: '**Valid skill/agent frontmatter.** Rendered skills and agents carry parseable frontmatter with non-empty `name`/`description`.'
        - ref: ADR-0008
          text: '**Backed invariants.** Every `inv: <slug>` tag in an Implemented ADR is backed by a matching `<marker> invariant: <slug>` comment in source, unless retired by an Implemented successor ADR (ADR-0031).'
        - ref: ADR-0046
          text: '**No dead skill references.** `awf check` fails on a rendered reference to a catalog skill outside the effective enabled set.'
        - ref: ADR-0012
          text: '**100% coverage gate.** `./x gate` fails below 100% statement coverage; exclude a genuinely-unreachable branch only with `// coverage-ignore: <reason>`.'
        - ref: ADR-0063
          text: '**Dead-code gate.** `./x gate` runs `deadcode` (no `-test`) over `./...` and fails on any production function unreachable from a `main` outside `internal/testsupport/`; `cmd/deadcodecheck` enforces this with no `//deadcode:ignore` escape hatch.'
        - ref: ADR-0066
          text: '**Advisory mutation triage.** `./x mutants` runs `gremlins` under the deterministic `.gremlins.yaml` config and is never part of `./x gate`; `cmd/mutants` exits non-zero when any mutant times out (the run is untrustworthy) and otherwise reports only survived (`LIVED`) mutants, treating a missing or empty report as no survivors.'
        - ref: ADR-0020
          text: '**No dead internal links.** `awf check` fails on any inline markdown link in an awf-managed rendered doc whose file-relative target is missing on disk.'
        - ref: ADR-0039
          text: '**Binary-version gate.** Every gated command (`sync`, `check`, `invariants`, `audit`, `list`, `add`, `remove`, `new`) refuses to run when the binary is behind the project on schema generation or lock `awfVersion`.'
        - ref: ADR-0040
          text: '**Self-pinning bootstrap.** The rendered `.awf/bootstrap.sh` pins exactly the rendering binary''s `project.Version`.'
        - ref: ADR-0040
          text: '**Bootstrap checksum.** The rendered bootstrap verifies the download SHA-256 before installing.'
        - ref: ADR-0048
          text: '**Inert hook payloads.** With the `hooks` singleton enabled, exactly three payload scripts render under `.awf/hooks/`; awf never activates hooks or touches git config — the `.githooks/` stubs are this repo''s own wiring.'
        - ref: ADR-0049
          text: '**Single version authority.** `awfVersion()` returns `project.Version`; no ldflags var or build info feeds gating, stamping, or pinning, and a schema-generation bump requires a matching `minVersionBySchema` entry and version bump.'
        - ref: ADR-0049
          text: '**Bootstrap output contract.** The rendered bootstrap prints exactly one stdout line (the resolved binary path), resolves an exactly-matching PATH `awf` before downloading, and verifies checksums via `sha256sum` or `shasum -a 256`.'
        - ref: ADR-0050
          text: '**Reviewing-skill/agent pairing.** A reviewing skill enabled without its dispatched agent fails every gated command; `awf remove agent` refuses upfront and `awf add skill` auto-enables the pair.'
        - ref: ADR-0051
          text: '**Single commit-scope storage.** Commit scopes live only in `audit.allowedScopes` — no `commitScope` var, no hand-written scope prose in templates; templates quote the `commitScopes` render key, and a scopes edit reflags referencing artifacts in `awf check`.'
        - ref: ADR-0055
          text: '**Config-derived guide scopes.** The agent guide''s commit-scope mention renders from `audit.allowedScopes` via the `commitScopes` render key — never a hand-written token list — and degrades to generic Conventional-Commits prose when scopes are accept-any; awf''s five code scopes mirror the `domains:` list by hand-maintained convention.'
        - ref: ADR-0053
          text: '**Full-catalog eval coverage.** The golden-task eval suite (`internal/evals`) renders every catalog skill and agent via a full `Project.SyncReport` and asserts cross-artifact workflow seams; its fixture enabled-set is derived from `catalog.Standard` so it cannot silently stop covering a new chain artifact.'
        - ref: ADR-0054
          text: '**Uniform machine-enforced chain handoffs.** Every catalog skill/agent template''s `awf:section` markers match its catalog-declared sections (`skill-section-parity`), so a section rename cannot half-land with a blank override path; and the `internal/evals` suite asserts each forward handoff names its successor on an invocation-verb line and that the ten-node chain graph is connected (no orphan, all reachable from `brainstorming`).'
        - ref: ADR-0060, ADR-0061
          text: '**Unified compile-time doc model.** The catalog is a compile-time Go value (`catalog.Standard`, no embedded YAML), and every doc — toggleable or always-on singleton — is one `DocEntry` from which every projection (`SingletonKinds`, `plainSingletons`, the `.layout` paths, the toggleable pool) derives; adding a mandatory doc is a single entry. Config-tree render units — the bootstrap, the hook payloads, and the working-memory `.gitignore` (ADR-0069) — are deliberately outside the doc collection: dedicated render blocks, no `DocEntry`.'
        - ref: ADR-0069
          text: '**Ephemeral working memory.** `awf sync` always renders the self-ignoring `.awf/memory/.gitignore`; working-memory files are session state — never committed, never cited by an ADR, plan, or commit message, deleted when the chain terminates.'
        - ref: ADR-0070
          text: '**Stub advisory, residual-marker guard.** Unauthored stub content — a stub-attributed section at its template default, or a part carrying the whole-line `awf:stub` marker — is a non-failing `awf check`/`awf init` note keyed by output path, never a failure; a marker-shaped `awf:section`/`awf:end` token surviving section assembly is a hard render error; and every shipped template section default is deliberately classified — authoring prompts carry `stub`, shippable prose stays plain.'
