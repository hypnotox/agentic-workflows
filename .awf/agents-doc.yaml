data:
    docMap: []
    commands:
        - cmd: go test ./...
          desc: run the test suite
        - cmd: ./x gate
          desc: run the gate before committing
        - cmd: ./x check
          desc: check rendered files for drift (also enforces the schema-version gate)
        - cmd: awf upgrade
          desc: migrate the config tree to the current schema after upgrading awf
    invariants:
        - ref: ADR-0001
          text: '**Publication-safe templates.** Every template renders with `missingkey=zero`; never emit a no-value token for an empty var — wrap optional output in a conditional. Run `awf check` after any sync to verify.'
        - text: '**`awf check` is the drift oracle.** After editing `.claude/awf/config.yaml`, a sidecar, or any part, run `./x sync && ./x check`; it also gates a stale config layout with a "run `awf upgrade`" message. Commit rendered files alongside config changes; never hand-edit a rendered file.'
        - text: '**Conventional Commits, `awf` scope.** One concern per commit; stage files explicitly (no `git add -A`).'
        - ref: ADR-0006
          text: '**Valid skill/agent frontmatter.** Rendered skills and agents carry parseable YAML frontmatter with non-empty `name`/`description`; `awf sync` fails fast and `awf check` reports `invalid-frontmatter` otherwise.'
        - ref: ADR-0008
          text: '**Backed invariants.** Each machine-enforceable ADR Invariants bullet carries an `inv: <slug>` tag backed by a `<marker> invariant: <slug>` comment in a source matching `invariants.sources`; `awf check` (and `awf invariants`) fail when an Implemented ADR has an unbacked — or unconfigured — tagged slug.'
        - ref: ADR-0012
          text: '**100% coverage gate.** `./x gate` fails below 100% statement coverage (`go test ./... -coverpkg=./...` piped through `cmd/covercheck`). A genuinely-unreachable defensive branch may be excluded with a trailing `// coverage-ignore: <reason>` directive — a non-empty reason is mandatory and every use is audited at review.'
