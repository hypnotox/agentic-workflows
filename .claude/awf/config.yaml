agents:
    - adr-reviewer
    - code-reviewer
    - plan-reviewer
docs:
    - architecture
    - development
    - glossary
    - pitfalls
    - testing
    - workflow
hooks:
    - pre-commit
    - pre-push
invariants:
    disabled: false
    sources:
        - globs:
            - '*.go'
          marker: //
prefix: awf
skills:
    - adr-lifecycle
    - brainstorming
    - bugfix
    - debugging
    - executing-plans
    - proposing-adr
    - refactor-coupling-audit
    - reviewing-adr
    - reviewing-impl
    - reviewing-plan
    - reviewing-plan-resync
    - roadmap-graduation
    - subagent-driven-development
    - tdd
    - writing-plans
vars:
    activeMdRegenCmd: ./x sync
    adrProposeCommitFmt: 'docs(adr): propose NNNN <short title>'
    checkCmd: ./x check
    commitScope: awf
    docCurrencyTargets: AGENTS.md, docs/decisions/README.md
    gateCmd: ./x gate
    gateCmdFull: ./x gate full
    gateDuration: ~15s
    invariantTestPath: ""
    modulePrefix: github.com/hypnotox/agentic-workflows
    testCmd: go test ./...
