prefix: awf
vars:
  activeMdRegenCmd: "./x sync"
  adrProposeCommitFmt: "docs(adr): propose NNNN <short title>"
  autonomousAdrRef: ""
  commitScope: "awf"
  debuggingDoc: ""
  docCurrencyTargets: "AGENTS.md, docs/decisions/README.md"
  checkCmd: "./x check"
  gateCmd: "./x gate"
  gateCmdFull: "./x gate full"
  gateDuration: "~15s"
  hostGitAdrRef: ""
  invariantTestPath: ""
  keyInvariantAdrRef: ""
  modulePrefix: "agentic-workflows"
  noDivingAdrRef: ""
  oracleStateDoc: ""
  perTaskReviewAdrRef: ""
  pitfallsDoc: ""
  roadmapDoc: ""
  stateDocsPath: ""
  testCmd: "go test ./..."
  workflowDoc: "AGENTS.md"
skills:
  adr-lifecycle:
    data:
      adrStates:
        - name: Proposed
          meaning: ADR is written and under review; content is freely mutable
          mutability: Freely mutable — body and status may both change
        - name: Accepted
          meaning: Design is finalised; implementation authorised but not yet complete
          mutability: Status field only — body is frozen
        - name: Implemented
          meaning: Design and implementation have both landed in the repository
          mutability: Status field only — body is frozen
        - name: Superseded
          meaning: Replaced by a later ADR; kept for historical record
          mutability: Status field only — body is frozen
  brainstorming: {}
  bugfix: {}
  debugging:
    sections:
      debugging-surfaces:
        replaceWith: parts/debugging-surfaces.md
  executing-plans: {}
  proposing-adr:
    data:
      adrTriggers:
        - Introducing a new internal package or changing package boundaries
        - Changing the render pipeline (template engine, section overlay, missingkey behaviour)
        - Changing the awf.yaml schema (new top-level keys, data/sections shape)
        - Adopting a new external dependency
        - Changing the manifest / lock file format
      adrSections:
        - Context
        - Decision
        - Invariants
        - Consequences
        - Alternatives Considered
  refactor-coupling-audit:
    sections:
      category-4-codegen:
        drop: true
      category-5-constructors:
        drop: true
  reviewing-adr: {}
  reviewing-impl: {}
  reviewing-plan: {}
  reviewing-plan-resync: {}
  roadmap-graduation: {}
  subagent-driven-development: {}
  tdd:
    data:
      testSurfaces:
        - name: Package unit tests
          location: internal/<pkg>
          kind: Go _test.go
        - name: Template golden tests
          location: internal/project/spine_test.go
          kind: render assertions
        - name: CLI integration tests
          location: cmd/awf
          kind: subprocess/temp-dir
  writing-plans: {}
agents:
  adr-reviewer:
    data:
      focusItems:
        - name: Schema stability
          description: ADRs that change awf.yaml or the lock format must enumerate all consumers (templates, render, manifest) and confirm backward compatibility or a migration path.
        - name: Template invariants
          description: ADRs touching templates must confirm the missingkey=zero constraint is preserved — no template may render a no-value token when vars are empty strings.
      docCurrencyItems:
        - check: "docs/decisions/ACTIVE.md regenerated by ./x sync when any ADR status changes"
        - check: "AGENTS.md updated when workflow chain or conventions change"
        - check: "docs/decisions/README.md index row added or updated for the ADR"
  code-reviewer:
    data:
      correctnessTraps:
        - description: "error returns must wrap with %w to preserve the error chain"
        - description: "nil map/pointer dereferences — check before indexing or method calls"
        - description: "missingkey=zero renders a no-value token for missing interface{} entries — keep vars complete; awf check catches this post-sync"
        - description: "template FuncMap functions must handle empty-string vars gracefully"
      docCurrencyItems:
        - check: "docs/decisions/ACTIVE.md regenerated by ./x sync when ADR frontmatter changes"
        - check: "AGENTS.md reflects workflow/convention changes"
  plan-reviewer:
    data:
      docCurrencyItems:
        - check: "docs/decisions/ACTIVE.md task included whenever an ADR status flip is planned"
        - check: "AGENTS.md update task included when the plan introduces new conventions or changes the workflow chain"
hooks:
  - pre-commit
  - pre-push
agentsDoc:
  data:
    ownership: |
      You are a developer on `awf` — the Agentic Workflows CLI and standard. You are responsible for its long-term health as well as the task in front of you. Bugs you notice in passing are yours; coverage gaps are yours; documentation drift is yours to fix in the same commit that caused it. awf is both the tool that publishes the standard and the first adopter of it, so its own setup must model what it generates.
    identity: |
      `awf` scaffolds, renders, and drift-checks a suite of Claude Code skills, review agents, git hooks, docs, and this agent guide into any Go project from a single `.claude/awf.yaml` config file. The full workflow chain is expressed as project-owned skill files under `.claude/skills/awf-*/` and review agents under `.claude/agents/`; hooks under `.githooks/` enforce the gate. Module path `agentic-workflows`; Go 1.26; private, pre-1.0, no external API stability.
    invariants:
      - text: "**Publication-safe templates.** Every template renders with `missingkey=zero`; never emit a no-value token for an empty var — wrap optional output in a conditional. Run `awf check` after any sync to verify."
        ref: ADR-0001
      - text: "**`awf check` is the drift oracle.** After editing `.claude/awf.yaml` or any part, run `./x sync && ./x check`. Commit rendered files alongside config changes; never hand-edit a rendered file."
      - text: "**Conventional Commits, `awf` scope.** One concern per commit; stage files explicitly (no `git add -A`)."
    docMap: []
docs:
  architecture:
    sections:
      body:
        replaceWith: parts/doc-architecture.md
