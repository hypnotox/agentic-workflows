# GoReleaser config for the awf CLI - builds cross-platform release binaries and
# publishes a GitHub Release on a v* tag (see ADR-0030). Hand-maintained, outside
# awf's render/lock set (like .golangci.yml and ./x). Validate with `goreleaser check`.
version: 2

project_name: awf

builds:
  - id: awf
    main: ./cmd/awf
    binary: awf
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: awf
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

# Release notes come from the curated changelog/CHANGELOG.md, not commit messages:
# release.yml extracts the tagged version's section with `awf changelog --version`
# and passes it via `--release-notes` (ADR-0096). Deriving notes from commit subjects
# leaked internal commits whose scopes dodged the exclude filters.
changelog:
  disable: true

release:
  draft: false
