name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Gate (test + 100% coverage + vet + lint)
        run: ./x gate
      - name: Drift check (rendered output matches config)
        run: ./x check
      - name: Coverage profile (for Codecov)
        run: go test ./... -coverpkg=./... -coverprofile=coverage.out
      - name: Filtered coverage profile (coverage-ignore blocks dropped)
        run: go run ./cmd/covercheck --emit-filtered coverage.out > coverage.covered.out
      # disable_search so each flag uploads ONLY its named file — otherwise the CLI
      # auto-discovers both .out files and merges them into every flag, collapsing
      # raw and covered to the same number.
      - name: Upload raw coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          disable_search: true
          flags: raw
          fail_ci_if_error: true
      - name: Upload covered coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.covered.out
          disable_search: true
          flags: covered
          fail_ci_if_error: true

  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: check
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean
