name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Gate (test + 100% coverage + vet + lint)
        run: ./x gate
      - name: Drift check (rendered output matches config)
        run: ./x check
