name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Gate (test + 100% coverage + vet + lint)
        run: ./x gate
      - name: Drift check (rendered output matches config)
        run: ./x check
      - name: Coverage profile (for Codecov)
        run: go test ./... -coverpkg=./... -coverprofile=coverage.out
      - name: Filtered coverage profile (coverage-ignore blocks dropped)
        run: go run ./cmd/covercheck --emit-filtered coverage.out > coverage.covered.out
      # disable_search so each flag uploads ONLY its named file - otherwise the CLI
      # auto-discovers both .out files and merges them into every flag, collapsing
      # raw and covered to the same number.
      # Fork and dependabot PRs run without repo secrets: both uploads skip there
      # (ADR-0079) - coverage enforcement is ./x gate, Codecov is reporting only.
      - name: Upload raw coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          disable_search: true
          flags: raw
          fail_ci_if_error: true
      - name: Upload covered coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.covered.out
          disable_search: true
          flags: covered
          fail_ci_if_error: true

  release-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.17.0
          args: check
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.17.0
          args: release --snapshot --clean
