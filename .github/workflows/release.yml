name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Verify tag matches project.Version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          want="$(go run ./cmd/awf version | awk '{print $2}')"
          if [ "$tag" != "$want" ]; then
            echo "tag v${tag} does not match project.Version ${want}" >&2
            exit 1
          fi
      - name: Verify changelog pins the release
        run: go run ./cmd/releasecheck
      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "tagged commit $(git rev-parse HEAD) is not on origin/main — push main first" >&2
            exit 1
          fi
      - name: Gate (test + 100% coverage + vet + lint)
        run: ./x gate
      - name: Drift check (rendered output matches config)
        run: ./x check
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
