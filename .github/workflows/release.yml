name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Verify tag matches project.Version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          want="$(go run ./cmd/awf version | awk '{print $2}')"
          if [ "$tag" != "$want" ]; then
            echo "tag v${tag} does not match project.Version ${want}" >&2
            exit 1
          fi
      - name: Verify changelog pins the release
        run: go run ./cmd/releasecheck
      - name: Verify tagged commit is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "tagged commit $(git rev-parse HEAD) is not on origin/main — push main first" >&2
            exit 1
          fi
      - name: Gate (test + 100% coverage + vet + lint)
        run: ./x gate
      - name: Drift check (rendered output matches config)
        run: ./x check
      - name: Prepare release notes from the curated changelog
        run: go run ./cmd/awf changelog --version "${GITHUB_REF_NAME#v}" > "${RUNNER_TEMP}/release-notes.md"
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: v2.17.0
          args: release --clean --release-notes ${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
