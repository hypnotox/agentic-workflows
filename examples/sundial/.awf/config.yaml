prefix: sundial
vars:
  activeMdRegenCmd: ./x sync
  checkCmd: ./x check
  commitGateCmd: ./x commit-gate
  gateCmd: ./x gate
  gateCmdFull: ./x gate full
  invariantTestPath: ./internal/...
  testCmd: ./x test
skills:
  - adr-lifecycle
  - brainstorming
  - bugfix
  - debugging
  - executing-direct
  - executing-plans
  - proposing-adr
  - refactor-coupling-audit
  - retrospective
  - reviewing-adr
  - reviewing-impl
  - reviewing-plan
  - reviewing-plan-resync
  - roadmap-graduation
  - subagent-driven-development
  - tdd
  - writing-plans
  - exploring
agents:
  - adr-reviewer
  - code-reviewer
  - plan-reviewer
docs:
  - architecture
  - debugging
  - development
  - glossary
  - pitfalls
  - roadmap
  - testing
targets:
  - claude
  - codex
  - copilot
  - cursor
  - gemini
  - pi
audit:
  allowedScopes:
    - almanac
    - schedule
    - cli
    - docs
bootstrap:
  enabled: true
hooks:
  enabled: true
runner:
  enabled: true
domains:
  - almanac
  - cli
currentState:
  sources:
    - globs:
        - "**/*.go"
      marker: //
  testGlobs:
    - "**/*_test.go"
  topicCoverage: error
  topicFanout: warn
  maxTopicsPerPath: 8
  maxClaimsPerTopic: 20
workflowTelemetry:
  retention:
    maxCompletedEffortAgeDays: 90
    maxCompletedEffortCount: 100
  widget:
    enabled: true
    showCost: true
  diagnostics:
    heuristicsEnabled: true
    minimumBaselineSamples: 10
    baselinePercentile: 95
    thresholds:
      phaseReentryCount: 2
      phaseDurationSeconds: 14400
      phaseTokens: 200000
      compactionCount: 3
      handoffCount: 3
      toolFailureCount: 3
      gateFailureCount: 2
      cacheReadPercentBelow: 10
      subagentQueueWaitSeconds: 60
      implementationReworkCount: 2
