agents:
  adr-reviewer:
    sections:
      - universal-lenses
      - project-focus
      - doc-currency
    data:
      focusItems:
        - name: decision-clarity
          description: each Decision item is a discrete, implementable commitment a reader could act on without further consultation
        - name: consequences-honesty
          description: trade-offs name real costs and operational implications, not straw men
      docCurrencyItems:
        - check: every document that states the behaviour this ADR changes is updated in the same commit
        - check: the decision index is regenerated when the ADR's status changes
  plan-reviewer:
    sections:
      - universal-lenses
      - project-focus
      - doc-currency
      - resync-note
    data:
      focusItems:
        - name: step-exactness
          description: every task names exact file paths, exact content or diffs, and exact commands with expected output
        - name: dependency-order
          description: tasks are ordered so each builds only on already-completed work
      docCurrencyItems:
        - check: the plan schedules updates for every document its changes invalidate, in the same commits
  code-reviewer:
    sections:
      - universal-lenses
      - project-focus
      - doc-currency
    data:
      correctnessTraps:
        - description: "error paths: every returned error is checked or explicitly ignored with a stated reason"
        - description: boundary conditions at empty, zero, and nil inputs
      focusItems:
        - name: plan-adherence
          description: the diff matches the plan's stated file paths and content; unexplained drift is a finding
        - name: test-coverage
          description: behaviour changes carry tests in the same commit; no assertion is weakened to pass
      docCurrencyItems:
        - check: the change updates every document that states the old behaviour — same commit
